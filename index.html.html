                      style="width:100%;border:1px solid var(--line);border-radius:6px;padding:10px 12px;font-size:13px;background:#fafcf8;color:var(--ink)"
                    >
                    ${media.imageUrl ? `<div style="margin-top:8px"><a href="${esc(media.imageUrl)}" target="_blank" rel="noreferrer"><img class="media-link-img" src="${esc(media.imageUrl)}" alt="Visual reference" onerror="this.style.display='none'"></a></div>` : ""}
                  </div>
                </div>
                ${levelEvidence.length > 0 ? `
                  <div style="margin-top:12px;border-top:1px solid var(--line);padding-top:12px">
                    <p style="margin:0 0 8px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">📎 Uploaded Content</p>
                    <div style="display:flex;flex-wrap:wrap;gap:10px">
                      ${levelEvidence.map(ev => `
                        ${ev.video ? `<a href="${esc(ev.video)}" target="_blank" rel="noreferrer" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;padding:5px 10px;border:1px solid var(--line);border-radius:6px;background:#f0f6fb;text-decoration:none;color:var(--blue)">🎬 Video link</a>` : ""}
                        ${ev.image ? `<a href="${esc(ev.image)}" target="_blank" rel="noreferrer" style="display:inline-block"><img src="${esc(ev.image)}" alt="Evidence" style="max-width:140px;max-height:100px;border-radius:6px;border:1px solid var(--line);object-fit:cover"></a>` : ""}
                      `).join("")}
                    </div>
                  </div>
                ` : ""}
              </div>
            `;
          }).join("")}
        </div>
        <div id="lessonPlanSaveMsg" style="display:none;margin-top:16px;padding:10px 16px;border-radius:8px;font-weight:700;font-size:14px;background:#d4f0e3;color:var(--green-dark)">✅ Saved!</div>
      `);
    }

    // ── CALENDAR ──
    function calendarView() {
      const unit = unitById(selectedUnitId);
      const calNode = nodeById(unit, selectedNodeId);
      const upcoming = [...state.calendar].sort((a,b)=>a.date.localeCompare(b.date));
      const [weekStart, weekEnd] = currentWeekRange();
      const weekLabel = `${weekStart.toLocaleDateString(undefined,{month:"short",day:"numeric"})} – ${weekEnd.toLocaleDateString(undefined,{month:"short",day:"numeric"})}`;
      const thisWeek = upcoming
        .filter(item => dateInRange(item.date, weekStart, weekEnd))
        .map(item => ({ item, iUnit: unitById(item.unitId), iNode: nodeById(unitById(item.unitId), item.nodeId) }));

      // Build Google Calendar embed block
      const gcalEmbedBlock = (() => {
        if (GOOGLE_CALENDAR_EMBED_URL) {
          // Embed the user's actual Google Calendar
          const embedSrc = GOOGLE_CALENDAR_EMBED_URL + (GOOGLE_CALENDAR_EMBED_URL.includes("?") ? "&" : "?")
            + `mode=MONTH&showTitle=0&showNav=1&showPrint=0&showTabs=1&showCalendars=0&showTz=0&color=%2320835f`;
          return `
            <div class="card" style="margin-bottom:22px;padding:0;overflow:hidden;border-radius:10px">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,#f0f9f4,#e8f4fb)">
                <div style="display:flex;align-items:center;gap:10px">
                  <img src="https://ssl.gstatic.com/calendar/images/dynamiclogo_2020q4/calendar_${new Date().getDate()}_2x.png" alt="" style="width:24px;height:24px;border-radius:4px" onerror="this.style.display='none'">
                  <strong style="font-size:15px">Google Calendar</strong>
                </div>
                <a href="https://calendar.google.com" target="_blank" rel="noreferrer">
                  <button class="secondary" style="width:auto;font-size:12px">Open in Google Calendar ↗</button>
                </a>
              </div>
              <iframe
                src="${esc(embedSrc)}"
                style="width:100%;height:600px;border:0;display:block"
                frameborder="0"
                scrolling="no"
                loading="lazy"
                title="Google Calendar"
              ></iframe>
            </div>`;
        }
        // No embed URL configured — show setup card
        return `
          <div class="card" style="margin-bottom:22px;border:2px dashed var(--line);background:rgba(255,255,255,.7)">
            <div style="display:flex;align-items:flex-start;gap:16px">
              <div style="width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#4285F4,#34A853);display:grid;place-items:center;flex-shrink:0">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="white" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
              </div>
              <div style="flex:1">
                <h4 style="margin:0 0 6px;font-size:16px">Connect Google Calendar</h4>
                <p style="margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.5">
                  Embed your Google Calendar here so your homeschool schedule and personal events appear side-by-side.
                  It only takes a minute to set up — no backend required.
                </p>
                <details style="margin-bottom:14px">
                  <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--green-dark)">How to set it up (3 steps)</summary>
                  <ol style="margin:10px 0 0;padding-left:18px;font-size:13px;color:var(--ink);line-height:1.8">
                    <li>Open <a href="https://calendar.google.com" target="_blank" rel="noreferrer" style="color:var(--blue)">Google Calendar</a> and go to <strong>Settings → Calendars</strong>.</li>
                    <li>Choose a calendar → <strong>Integrate calendar</strong> → copy the <strong>Public URL to this calendar</strong> (under "Embed code" it starts with <code>https://calendar.google.com/calendar/embed?src=…</code>).</li>
                    <li>In this HTML file, find <code>const GOOGLE_CALENDAR_EMBED_URL = "";</code> near the top of the script and paste your URL between the quotes. Save &amp; reload — the calendar will appear here.</li>
                  </ol>
                </details>
                <div style="display:flex;gap:10px;flex-wrap:wrap">
                  <a href="https://calendar.google.com/calendar/r/settings" target="_blank" rel="noreferrer">
                    <button style="width:auto;font-size:13px;background:linear-gradient(135deg,#4285F4,#34A853)">⚙️ Open Calendar Settings</button>
                  </a>
                  <a href="https://calendar.google.com" target="_blank" rel="noreferrer">
                    <button class="secondary" style="width:auto;font-size:13px">📅 Open Google Calendar</button>
                  </a>
                </div>
              </div>
            </div>
          </div>`;
      })();

      return appShell(html`
        <div class="topbar">
          <div>
            <p class="eyebrow">Planning</p>
            <h2 class="page-title">Calendar</h2>
            <p class="subtext" style="margin-top:4px">Schedule lessons, mark days off, and view your Google Calendar all in one place.</p>
          </div>
          <a href="https://calendar.google.com" target="_blank" rel="noreferrer" style="flex-shrink:0">
            <button class="secondary" style="width:auto;font-size:12px;white-space:nowrap">📅 Google Calendar ↗</button>
          </a>
        </div>

        <!-- Google Calendar embed -->
        ${gcalEmbedBlock}

        <!-- Scheduling form -->
        <div class="log-work-section" style="margin-bottom:22px">
          <h3>🗓 Schedule Lesson</h3>
          <form style="display:grid;gap:13px" id="calendarForm">
            <label>Date
              <input name="date" type="date" required value="${new Date().toISOString().slice(0,10)}">
            </label>
            <label>Child
              <select name="childId" id="calChildSel">
                <option value="">Any child</option>
                ${state.children.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}
              </select>
            </label>
            <label>Unit
              <select name="unitId" id="calUnitSel">${units.map(u=>`<option value="${u.id}" ${u.id===unit.id?"selected":""}>${esc(u.name)}</option>`).join("")}</select>
            </label>
            <label>Subject
              <select name="subjectId" id="calSubjectSel">${`<option value="">— Any Subject —</option>` + visibleSubjects().map(s=>`<option value="${s.id}" ${s.id===selectedSubjectId?"selected":""}>${s.icon} ${esc(s.label)}</option>`).join("")}</select>
            </label>
            <label>Topic
              <select name="nodeId" id="calNodeSel">${unit.nodes.map(n=>`<option value="${n[0]}" ${n[0]===calNode[0]?"selected":""}>${esc(n[1])}</option>`).join("")}</select>
            </label>
            <label>Node
              <select name="nodeInstance" id="calNodeSel2">${nodeOptionsForTopic(unit.id, calNode[0]||"").map(o => `<option value="${esc(o.value)}">${esc(o.label)}</option>`).join("")}</select>
            </label>
            <label>Bloom Level
              <select name="level" id="calLevelSel">${BLOOM.map(l=>`<option>${l}</option>`).join("")}</select>
            </label>
            <label>Assignment #
              <select name="assignmentNum" id="calAssignSel">
                ${Array.from({length: assignmentCountForNode(unit.id, calNode[0])}, (_,i) => `<option value="${i+1}">Assignment ${i+1}</option>`).join("")}
              </select>
            </label>
            <div class="card" style="box-shadow:none;background:#f8fbf9;padding:12px;margin:0">
              <strong style="font-size:13px">Node &amp; Materials for this selection:</strong>
              <div id="calNodePreview" style="color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5">${esc(state.nodeTexts?.[unit.id+"|"+calNode[0]] || calNode[2]||"Select a node to see its text.")}</div>
              <div id="calMaterialsPreview" style="color:var(--muted);font-size:13px;margin-top:6px">${esc(state.nodeTexts?.[unit.id+"|"+calNode[0]+"|materials"] || lessonMaterials(unit.id,calNode[0],"Remember")||"No materials saved yet.")}</div>
            </div>
            <div><button type="submit" style="width:100%">Schedule Lesson</button></div>
          </form>
        </div>

        <!-- Scheduled items -->
        <div class="calendar-list" style="margin-bottom:22px">
          ${upcoming.map(item => {
            const iUnit = unitById(item.unitId);
            const iNode = nodeById(iUnit, item.nodeId);
            const childLabel = item.childId ? childName(item.childId) : "Any child";
            const logged = item.evidenceId ? state.evidence.find(e => e.id === item.evidenceId) : null;
            const interestLabel = logged?.interest ? INTEREST_LABELS[logged.interest] : "";
            const isEditing = openLogItemId === item.id;
            return `
              <div class="row" style="align-items:flex-start">
                <div class="calendar-date">${esc(formatShortDate(item.date))}</div>
                <div class="row-main">
                  <h4>${esc(childLabel)} — ${esc(iUnit.name)} / ${esc(iNode[1])} / ${esc(item.level)}${item.assignmentNum ? ` / Assignment ${esc(item.assignmentNum)}` : ""}</h4>
                  ${item.nodeText ? `<p style="font-size:12px;margin-top:4px">${esc(item.nodeText)}</p>` : ""}
                  ${item.materialsText ? `<p style="font-size:12px;color:var(--muted)">Materials: ${esc(item.materialsText)}</p>` : ""}
                  ${logged && !isEditing ? `
                    <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)">
                      <span style="font-size:11px;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:.05em">📝 Logged</span>
                      ${interestLabel ? `<p style="margin:4px 0 0;font-size:12px">${esc(interestLabel)}</p>` : ""}
                      ${logged.notes ? `<p style="margin:4px 0 0;font-size:13px">${esc(logged.notes)}</p>` : ""}
                      ${logged.video ? `<a href="${esc(logged.video)}" target="_blank" rel="noreferrer" style="font-size:12px">🎬 Video link</a>` : ""}
                      ${logged.image ? `<img class="attachment" src="${logged.image}" alt="Uploaded evidence" style="margin-top:4px">` : ""}
                      ${logged.completeAssignment ? `<span class="tag" style="margin-top:4px;display:inline-block">✓ Assignment complete</span>` : ""}
                    </div>
                  ` : ""}
                  ${!isEditing ? `
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;align-items:center">
                      <button type="button" class="secondary" data-log-item="${item.id}" style="width:auto;font-size:12px">${logged ? "✏️ Edit Log" : "📝 Log This Lesson"}</button>
                      <a href="${buildGCalEventUrl(item)}" target="_blank" rel="noreferrer" title="Add to Google Calendar">
                        <button type="button" class="secondary" style="width:auto;font-size:12px;padding:6px 10px;background:white;border:1px solid #d2ddd9">
                          <svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#4285F4" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/></svg>Add to GCal
                        </button>
                      </a>
                    </div>
                  ` : `
                    <form id="calLogForm" data-log-for="${item.id}" style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:grid;gap:10px">
                      <label>Interest
                        <div class="interest-row">
                          ${[5,4,3,2,1].map(n => `<button type="button" class="interest-btn${String(logged?.interest||"")===String(n)?" sel-"+n:""}" data-interest="${n}" title="${INTEREST_LABELS[n]}">${INTEREST_LABELS[n]}</button>`).join("")}
                          <input type="hidden" name="interest" value="${esc(logged?.interest||"")}">
                        </div>
                      </label>
                      <label>Notes
                        <textarea name="notes" placeholder="What did the child say, make, notice, or try?">${esc(logged?.notes||"")}</textarea>
                      </label>
                      <label>Evidence (Image)
                        <input name="image" type="file" accept="image/*">
                        ${logged?.image ? `<img class="attachment" src="${logged.image}" alt="Current evidence" style="margin-top:6px">` : ""}
                      </label>
                      <label>Evidence (Video Link)
                        <input name="video" type="url" placeholder="https://..." value="${esc(logged?.video||"")}">
                      </label>
                      <label class="check-row" style="font-size:14px;font-weight:600;color:var(--ink)">
                        <input name="completeAssignment" type="checkbox" ${logged?.completeAssignment?"checked":""}> Mark this assignment complete
                      </label>
                      <div style="display:flex;gap:10px">
                        <button type="submit" style="width:auto">Save Log</button>
                        <button type="button" class="secondary" data-cancel-log style="width:auto">Cancel</button>
                      </div>
                    </form>
                  `}
                </div>
                <button class="icon secondary x-btn" title="Remove" data-delete-calendar="${item.id}">×</button>
              </div>
            `;
          }).join("") || `<div class="empty" style="margin-bottom:16px">No lessons scheduled yet.</div>`}
        </div>

        <!-- Upcoming nodes & materials SIDE BY SIDE -->
        <div class="section-title" style="margin-top:0">
          <h3>This Week's Schedule</h3>
          <span style="color:var(--muted);font-size:13px">${esc(weekLabel)} · resets every Saturday night</span>
        </div>
        <div class="upcoming-grid">
          <div class="upcoming-box">
            <h4>📖 Nodes &amp; Materials</h4>
            <div style="display:grid;gap:10px">
              ${(() => {
                if (!thisWeek.length) return `<p style="color:var(--muted);font-size:13px">No lessons scheduled for ${esc(weekLabel)} yet.</p>`;
                // Deduplicate by unitId|nodeId
                const seen = {};
                thisWeek.forEach(({item, iUnit, iNode}) => {
                  const k = iUnit.id + "|" + iNode[0];
                  if (!seen[k]) {
                    seen[k] = { iUnit, iNode, count: 1,
                      nodeText: item.nodeText || state.nodeTexts?.[iUnit.id+"|"+iNode[0]] || iNode[2] || "",
                      mats: item.materialsText || state.nodeTexts?.[iUnit.id+"|"+iNode[0]+"|materials"] || lessonMaterials(iUnit.id, iNode[0], item.level) || "",
                      media: lessonMedia(iUnit.id, iNode[0], item.level)
                    };
                  } else { seen[k].count++; }
                });
                return Object.values(seen).map(({iUnit, iNode, count, nodeText, mats, media}) => `
                  <div style="border-left:3px solid var(--green);padding-left:10px">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
                      <strong style="font-size:13px">${esc(iUnit.name)} · ${esc(iNode[1])}</strong>
                      ${count > 1 ? `<span class="tag" style="font-size:11px;padding:2px 7px">×${count}</span>` : ""}
                    </div>
                    ${nodeText ? `<p style="margin:0 0 5px;color:var(--ink);font-size:12px;line-height:1.45">${esc(nodeText.slice(0,160))}${nodeText.length>160?"…":""}</p>` : ""}
                    ${mats ? `<div style="margin-top:4px;padding:6px 8px;background:#f8fbf9;border-radius:5px;border:1px solid var(--line)"><span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Materials</span><p style="margin:3px 0 0;font-size:12px;color:var(--ink);line-height:1.4">${esc(mats.slice(0,120))}${mats.length>120?"…":""}</p></div>` : ""}
                    ${media.video||media.imageUrl ? `<div style="display:flex;gap:8px;margin-top:5px;flex-wrap:wrap">${media.video?`<a href="${esc(media.video)}" target="_blank" rel="noreferrer" style="font-size:12px">🎬 Video</a>`:""}${media.imageUrl?`<a href="${esc(media.imageUrl)}" target="_blank" rel="noreferrer" style="font-size:12px">🖼 Image</a>`:""}</div>` : ""}
                  </div>
                `).join("");
              })()}
            </div>
          </div>
          <div class="upcoming-box">
            <h4>📋 Assignments</h4>
            <div style="display:grid;gap:10px">
              ${(() => {
                if (!thisWeek.length) return `<p style="color:var(--muted);font-size:13px">No assignments scheduled for ${esc(weekLabel)} yet. Use the form above to schedule one.</p>`;
                // Deduplicate by unitId|nodeId|level|assignmentNum
                const seen = {};
                thisWeek.forEach(({item, iUnit, iNode}) => {
                  const k = iUnit.id + "|" + iNode[0] + "|" + item.level + "|" + (item.assignmentNum||"");
                  if (!seen[k]) {
                    seen[k] = { iUnit, iNode, item, count: 1 };
                  } else { seen[k].count++; }
                });
                return Object.values(seen).map(({iUnit, iNode, item, count}) => {
                  const prompt = lessonPrompt(iUnit.id, iNode[0], iNode[1], item.level);
                  return `
                  <div style="border-left:3px solid var(--blue);padding-left:10px">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                      <strong style="font-size:13px">${esc(iNode[1])}${item.assignmentNum ? ` · Assign. ${esc(item.assignmentNum)}` : ""}</strong>
                      ${count > 1 ? `<span class="tag" style="font-size:11px;padding:2px 7px">×${count}</span>` : ""}
                    </div>
                    <span class="tag" style="font-size:11px;margin-bottom:5px;display:inline-block">${esc(item.level)}</span>
                    <p style="margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.4">${esc((prompt||"").slice(0,140))}${(prompt||"").length>140?"…":""}</p>
                  </div>
                `}).join("");
              })()}
            </div>
          </div>
        </div>
        ${(() => {
          const _now = new Date();
          const weekStart = new Date(_now); weekStart.setDate(_now.getDate() - _now.getDay());
          const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
          const ftThisWeek = [];
          for (let d = new Date(weekStart); d <= weekEnd; d.setDate(d.getDate()+1)) {
            const iso = d.toISOString().slice(0,10);
            (state.calFieldTrips[iso]||[]).forEach(name => ftThisWeek.push({ iso, name }));
          }
          // Every ftLogs key that belongs to a trip happening this week, for the "Delete All" button.
          const weekLogKeys = ftThisWeek.flatMap(({iso, name}) =>
            state.children.map(c => iso + "|" + name + "|" + c.id).filter(k => state.ftLogs[k])
          );
          return `
            <div class="section-title" style="margin-top:20px">
              <h3>🚌 Field Trips This Week</h3>
              ${weekLogKeys.length > 0 ? `<button class="secondary" data-ft-delete-all-week style="width:auto;font-size:12px;color:var(--rose);border-color:var(--rose)">🗑 Delete All Logs This Week (${weekLogKeys.length})</button>` : ""}
            </div>
            ${!ftThisWeek.length ? `<p style="color:var(--muted);font-size:13px">No field trips scheduled this week. Use the 📅 button on any trip in the Field Trips section.</p>` : `
              <div style="display:grid;gap:12px">
                ${ftThisWeek.map(({iso, name}) => {
                  const tripKey = iso + "|" + name;
                  const openLogChildId = state.ui["ftLogOpen_"+tripKey] || null;
                  return `
                    <div style="border:1px solid #b7c6de;border-radius:10px;overflow:hidden;background:#e7edf7">
                      <div style="display:flex;align-items:center;gap:10px;padding:12px 14px">
                        <span style="font-size:20px">🚌</span>
                        <div style="flex:1">
                          <p style="margin:0;font-size:15px;font-weight:700;color:var(--navy)">${esc(name)}</p>
                          <p style="margin:2px 0 0;font-size:12px;color:var(--muted)">${esc(formatShortDate(iso))}</p>
                        </div>
                        <button class="secondary" data-ft-unschedule="${iso}|${name}" title="Remove from this week's schedule" style="width:auto;font-size:12px;padding:4px 10px;color:var(--rose);border-color:var(--rose)">✕ Unschedule</button>
                      </div>
                      <div style="padding:0 14px 12px;display:grid;gap:8px">
                        ${state.children.map(child => {
                          const logKey = tripKey + "|" + child.id;
                          const absentKey = tripKey + "|" + child.id;
                          const isAbsent = (state.ftAbsent || {})[absentKey];
                          const existing = state.ftLogs[logKey];
                          const isOpen = openLogChildId === child.id;
                          if (isAbsent) return `
                            <div style="background:#fafafa;border:1px dashed var(--line);border-radius:8px;padding:8px 12px;opacity:0.6">
                              <div style="display:flex;align-items:center;gap:8px">
                                <span style="font-size:13px;font-weight:700;color:var(--muted);flex:1;text-decoration:line-through">${esc(child.name)}</span>
                                <span style="font-size:11px;color:var(--muted)">Didn't attend</span>
                                <button class="secondary" data-ft-unabsent="${absentKey}" title="Mark as attended" style="width:auto;font-size:11px;padding:3px 8px">↩ Restore</button>
                              </div>
                            </div>
                          `;
                          return `
                            <div style="background:white;border:1px solid var(--line);border-radius:8px;padding:10px 12px">
                              <div style="display:flex;align-items:center;gap:8px">
                                <span style="font-size:13px;font-weight:700;color:var(--ink);flex:1">${esc(child.name)}</span>
                                ${existing ? `<span style="font-size:11px;font-weight:700;color:var(--green-dark);background:#d4f0e3;padding:2px 8px;border-radius:999px">✓ Logged</span>` : ""}
                                <button class="secondary" data-ft-openlog="${tripKey}|${child.id}" style="width:auto;font-size:12px;padding:4px 10px">${existing ? "✏️ Edit" : "📝 Log"}</button>

    // ── CHILD PROFILE ──
    function childView() {
      const child = state.children.find(c=>c.id===selectedChildId) || state.children[0];
      if (!child) return childrenView();
      const evidence = state.evidence.filter(e=>e.childId===child.id);
      const progressEntries = (state.progressHistory||[]).filter(p=>p.childId===child.id).map(p=>({...p, type:"stepforward"}));
      const fullHistory = [...evidence, ...progressEntries].sort((a,b)=>new Date(b.date)-new Date(a.date));

      // Progress tracker: for each subject, what's the highest bloom level
      const subjectProgress = visibleSubjects().map(sub => {
        let highestBloom = null;
        let highestIdx = -1;
        // Check completions (from step forward checklist completions)
        for (const unit of units) {
          for (const node of unit.nodes) {
            const done = completedLevels(child.id, unit.id, node[0]);
            if (done.length > 0) {
              const last = done[done.length - 1];
              const idx = BLOOM.indexOf(last);
              if (idx > highestIdx) { highestIdx = idx; highestBloom = last; }
            }
          }
        }
        // Also check subject-level completions from step forward
        for (let i = BLOOM.length - 1; i >= 0; i--) {
          const sfKey = `${child.id}|${sub.id}|${BLOOM[i]}`;
          if (state.completions[sfKey]) {
            if (i > highestIdx) { highestIdx = i; highestBloom = BLOOM[i]; }
            break;
          }
        }
        return { sub, highestBloom, highestIdx };
      });

      // Interest tracker — topics only
      // Gather all interest ratings per topic (nodeId)
      const topicInterest = {};
      for (const ev of evidence) {
        if (!ev.interest) continue;
        const topicKey = ev.nodeId;
        if (!topicInterest[topicKey]) {
          const unit = unitById(ev.unitId);
          const node = nodeById(unit, ev.nodeId);
          topicInterest[topicKey] = { name: node[1], unitName: unit.name, total: 0, count: 0 };
        }
        topicInterest[topicKey].total += Number(ev.interest);
        topicInterest[topicKey].count += 1;
      }
      const topicList = Object.values(topicInterest).map(t => ({ ...t, avg: t.total / t.count }))
        .sort((a, b) => b.avg - a.avg);
      const top3 = topicList.slice(0, 3);
      const bottom3 = topicList.slice(-3).reverse().filter(t => t.avg < 3.5);
      const medals = ["🥇", "🥈", "🥉"];

      // Field Trip Fun — mirrors the Interest Tracker pattern above, but keyed by trip name.
      // Reads every ftLogs entry generically, so any new fields logged later show up here
      // automatically without further code changes. Ranking uses each visit's average across
      // the 5 Pancha Kosha dimensions (presence/regulation/curiosity/growth/joy) when present,
      // falling back to the older single "interest" rating for any logs made before that rubric.
      const ftLogsForChild = childFieldTripLogs(child.id);
      function logScore(log) {
        const scores = FT_KOSHA_DIMENSIONS.map(d => Number(log[d.key])).filter(n => n > 0);
        if (scores.length) return scores.reduce((a,b)=>a+b,0) / scores.length;
        return log.interest ? Number(log.interest) : null;
      }
      const ftByTrip = {};
      for (const log of ftLogsForChild) {
        ftByTrip[log.tripName] ||= { name: log.tripName, season: log.season, total: 0, scored: 0, count: 0, logs: [] };
        ftByTrip[log.tripName].logs.push(log);
        ftByTrip[log.tripName].count += 1;
        const score = logScore(log);
        if (score != null) { ftByTrip[log.tripName].total += score; ftByTrip[log.tripName].scored += 1; }
      }
      const ftTripList = Object.values(ftByTrip).map(t => ({ ...t, avg: t.scored ? t.total / t.scored : 0 }))
        .sort((a, b) => b.count - a.count);
      const ftTop3 = ftTripList.filter(t => t.avg >= 1).slice(0, 3).sort((a,b)=>b.avg-a.avg);

      return appShell(html`
        <div class="topbar">
          <div>
            <p class="eyebrow">Child Profile</p>
            <h2 class="page-title">${esc(child.name)}</h2>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
              <select id="portfolioYearSel" style="min-height:40px;border-radius:6px;border:1px solid var(--line);padding:0 10px;font-size:13px;background:#fff">
                ${(() => {
                  const opts = ['<option value="all">All Years</option>'];
                  // Generate school years from 2023-24 to 3 years in future
                  const startYear = 2023;
                  const endYear = new Date().getFullYear() + 3;
                  for (let y = endYear; y >= startYear; y--) {
                    const label = `Aug ${y} – Jul ${y+1}`;
                    opts.push(`<option value="${y}">${label}</option>`);
                  }
                  return opts.join("");
                })()}
              </select>
              <button class="portfolio-pdf-btn" data-portfolio-pdf="${child.id}" style="white-space:nowrap">⬇ Download Portfolio PDF</button>
            </div>
            <label style="display:grid;place-items:center;background:#e6ebe7;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:12px;color:var(--ink);min-height:40px;padding:0 12px;white-space:nowrap">⬆ Import Portfolio<input type="file" accept=".json" data-portfolio-import="${child.id}" style="display:none"></label>
            <button class="secondary" data-view="children">← All Children</button>

    // ── YEARBOOK: OPEN COLLAGE BOOK FOR ONE SCHOOL YEAR ──
    // Build synthetic evidence entries from field trip photo/video logs so they
    // show up in the yearbook immediately after being saved — no manual re-logging needed.
    function ftMediaAsEvidence() {
      const synthetic = [];

      // ── Field trip logs (from calendar weekly scheduling) ──
      for (const [logKey, log] of Object.entries(state.ftLogs || {})) {
        if (!log) continue;
        const parts = logKey.split("|");
        if (parts.length < 3) continue;
        const childId = parts[parts.length - 1];
        const tripName = parts.slice(1, -1).join("|");
        const dateIso = parts[0];
        if (!dateIso || !/^\d{4}-\d{2}-\d{2}$/.test(dateIso)) continue;
        const dateStr = dateIso + "T12:00:00";

        const media = log.media || [];
        for (let mi = 0; mi < media.length; mi++) {
          const m = media[mi];
          synthetic.push({
            id: "ftlog|" + logKey + "|" + mi,
            childId, date: dateStr,
            image: m.type === "image" ? m.data : "",
            video: m.type === "video" ? (m.url || "") : "",
            notes: log.notes || "",
            unitId: "", nodeId: "", subjectId: "",
            _isFtMedia: true, _tripName: tripName, _logKey: logKey
          });
        }

        // Ratings/notes-only entry — always add one entry per log so all trips appear
        if (!media.length) {
          synthetic.push({
            id: "ftlog|" + logKey + "|entry",
            childId, date: dateStr,
            image: "", video: "", notes: log.notes || "",
            unitId: "", nodeId: "", subjectId: "",
            _isFtMedia: true, _tripName: tripName, _logKey: logKey
          });
        }
      }

      // ── Visit photos (from Field Trips page → visit history 📷 button) ──
      for (const [visitKey, media] of Object.entries(state.ftVisitMedia || {})) {
        if (!media?.length) continue;
        const [tripId, viStr] = visitKey.split("|");
        const vi = Number(viStr);
        // Find the trip to get name and visit date
        for (const season of FT_SEASONS) {
          const trip = (state.fieldTrips[season.id] || []).find(t => t.id === tripId);
          if (!trip) continue;
          const visit = trip.visits[vi];
          if (!visit) continue;
          const dateIso = visit.date || visit;
          if (!dateIso || !/^\d{4}-\d{2}-\d{2}$/.test(dateIso)) continue;
          const dateStr = dateIso + "T12:00:00";
          for (let mi = 0; mi < media.length; mi++) {
            const m = media[mi];
            synthetic.push({
              id: "ftvisit|" + visitKey + "|" + mi,
              childId: "", date: dateStr,
              image: m.type === "image" ? m.data : "",
              video: "", notes: "",
              unitId: "", nodeId: "", subjectId: "",
              _isFtMedia: true, _tripName: trip.name, _visitKey: visitKey
            });
          }
          break;
        }
      }

      return synthetic;
    }

    function yearbookYearView() {
      const years = yearbookAvailableYears();
      if (!years.includes(parseInt(selectedYearbookYear))) {
        selectedYearbookYear = String(years[0] ?? "");
      }
      if (!selectedYearbookYear) return yearbookView();
      const startYear = parseInt(selectedYearbookYear);
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

      // Merge regular evidence with field-trip media logs
      // Include all logged entries — image/video/notes all optional (entries with only ratings still appear as 📝 cards)
      const allEvidence = [...state.evidence, ...ftMediaAsEvidence()].filter(e => schoolYearStartYear(e.date) === startYear);
      const childIdsPresent = Array.from(new Set(allEvidence.map(e => e.childId).filter(Boolean)));
      const filtered = yearbookChildFilter === "all" ? allEvidence : allEvidence.filter(e => e.childId === yearbookChildFilter);

      // Group: month-key -> childId ("_none" if unassigned) -> items[]
      const groups = {};
      for (const ev of filtered) {
        const d = new Date(ev.date);
        const mk = d.getFullYear() + "-" + String(d.getMonth()).padStart(2, "0");
        groups[mk] ||= { label: monthNames[d.getMonth()] + " " + d.getFullYear(), byChild: {} };
        const cid = ev.childId || "_none";
        groups[mk].byChild[cid] ||= [];
        groups[mk].byChild[cid].push(ev);
      }
      // School year runs Aug -> Jul, so order months Aug..Dec then Jan..Jul of next year
      const monthOrder = [];
      for (let m = 7; m <= 11; m++) monthOrder.push(startYear + "-" + String(m).padStart(2,"0"));
      for (let m = 0; m <= 6; m++) monthOrder.push((startYear+1) + "-" + String(m).padStart(2,"0"));
      const sortedKeys = monthOrder.filter(k => groups[k]);

      function ybCard(ev) {
        const unit = unitById(ev.unitId);
        const node = unit ? nodeById(unit, ev.nodeId) : null;
        const subLabel = ev.subjectId ? (SUBJECTS.find(s=>s.id===ev.subjectId)?.label || "") : "";
        const dateStr = new Date(ev.date).toLocaleDateString(undefined, { month:"short", day:"numeric" });
        const ytThumb = ev.video ? youtubeThumbUrl(ev.video) : "";
        const caption = ev._isFtMedia
          ? ("🚌 " + (ev._tripName || "Field Trip"))
          : [node?.[1], subLabel].filter(Boolean).join(" · ");
        let mediaHtml;
        if (ev.image) {
          mediaHtml = `<img src="${ev.image}" alt="Memory" loading="lazy">`;
        } else if (ev.video && ytThumb) {
          mediaHtml = `<img src="${ytThumb}" alt="Video thumbnail" loading="lazy"><div class="yb-play"><span>▶</span></div>`;
        } else if (ev.video) {
          mediaHtml = `<div class="ph-placeholder">🎬</div>`;
        } else {
          mediaHtml = `<div class="ph-placeholder">📝</div>`;
        }
        const dataAttrs = `data-yb-card="${ev.id}" data-yb-image="${ev.image ? esc(ev.image) : ""}" data-yb-video="${ev.video ? esc(ev.video) : ""}" data-yb-notes="${esc(ev.notes||"")}" data-yb-caption="${esc(caption)}" data-yb-date="${esc(dateStr)}"`;
        return `
          <div class="yb-card" ${dataAttrs}>
            <div class="yb-card-media">${mediaHtml}</div>
            <div class="yb-card-cap">
              <span class="yb-date">${esc(dateStr)}</span>
              ${caption ? esc(caption) : (ev.notes ? esc(ev.notes.slice(0,60)) : "Logged moment")}
              ${ev.interest ? `<span class="yb-tag-mini">${esc(INTEREST_LABELS[ev.interest]||"")}</span>` : ""}
            </div>
          </div>
        `;
      }

      return appShell(html`
        <div class="topbar">
          <div>
            <p class="eyebrow">Memory Book</p>
            <h2 class="page-title">📔 ${schoolYearLabel(startYear)}</h2>
            <p class="subtext">${filtered.length} logged moment${filtered.length===1?"":"s"}${yearbookChildFilter!=="all" ? " for " + esc(childName(yearbookChildFilter)) : " for all children"} this school year.</p>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start">
            <select id="yearbookYearSel" style="min-height:40px;border-radius:6px;border:1px solid var(--line);padding:0 10px;font-size:13px;background:#fff">
              ${years.map(y => `<option value="${y}" ${y===startYear?"selected":""}>${schoolYearLabel(y)}</option>`).join("")}
            </select>
            <select id="yearbookChildSel" style="min-height:40px;border-radius:6px;border:1px solid var(--line);padding:0 10px;font-size:13px;background:#fff">
              <option value="all" ${yearbookChildFilter==="all"?"selected":""}>All children</option>
              ${childIdsPresent.map(cid => `<option value="${cid}" ${yearbookChildFilter===cid?"selected":""}>${esc(childName(cid))}</option>`).join("")}
            </select>
            <button class="secondary" data-yearbook-export-html="${startYear}" style="white-space:nowrap">⬇ Export Yearbook (HTML)</button>
            <button class="secondary" data-yearbook-export-pdf="${startYear}" style="white-space:nowrap">⬇ Export Yearbook (PDF)</button>
            <button class="secondary" data-view="yearbook">← All Years</button>
          </div>
        </div>

        ${sortedKeys.length === 0 ? `
          <div class="empty">No moments logged yet for ${esc(yearbookChildFilter==="all"?"any child":childName(yearbookChildFilter))} in this school year.</div>
        ` : sortedKeys.map(mk => {
          const { label, byChild } = groups[mk];
          const childKeys = Object.keys(byChild).sort((a,b) => {
            if (a === "_none") return 1;
            if (b === "_none") return -1;
            return childName(a).localeCompare(childName(b));
          });
          return `
            <div class="yb-page">
              <h3 class="yb-month-title">🗓 ${esc(label)}<span class="yb-line"></span></h3>

    // ── PARENT TRACKERS VIEW ──
    function parentTrackersView() {
      const p1Name = state.parentNames?.p1 || "Parent 1";
      const p2Name = state.parentNames?.p2 || "Parent 2";
      const trackers = state.parentTrackers || {};

      // Build chart data for each parent
      function parentChartData(parentKey) {
        const entries = Object.entries(trackers)
          .filter(([k,v]) => k.startsWith(parentKey + "|") && v?.submitted)
          .sort(([a],[b]) => a.localeCompare(b))
          .slice(-30);
        return entries;
      }

      function renderMiniBars(entries, max=5) {
        if (!entries.length) return '<p style="color:var(--muted);font-size:13px">No data yet.</p>';
        const bars = entries.map(([k,v]) => {
          const h = Math.max(4, ((v.stars||1)/max)*60);
          const color = v.stars >= 4 ? "var(--green)" : v.stars >= 3 ? "var(--blue)" : "var(--rose)";
          const d = k.split("|")[1];
          return `<div class="mini-bar" style="height:${h}px;background:${color}" title="${d}: ${v.stars||0}★"></div>`;
        }).join("");
        return `<div class="mini-bar-chart">${bars}</div>`;
      }

      function renderParentSummary(parentKey, pName, metricLabel, metricOptions, starLabels) {
        const entries = parentChartData(parentKey);
        const total = entries.length;
        const avgStars = total ? (entries.reduce((s,[,v])=>s+(v.stars||0),0)/total).toFixed(1) : "—";
        const yesCount = entries.filter(([,v])=>v.metric==="Yes").length;
        const metricPct = total ? Math.round((yesCount/total)*100) : 0;

        // Last 7 days
        const last7 = entries.slice(-7);
        const recentAvg = last7.length ? (last7.reduce((s,[,v])=>s+(v.stars||0),0)/last7.length).toFixed(1) : "—";

        return `
        <div class="card" style="margin-bottom:22px">
          <div class="parent-profile-card" style="margin-bottom:16px;border-radius:8px">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65)">Parent Profile</p>
                <h2 style="margin:4px 0 0;font-size:24px;color:white" id="${parentKey}NameDisplay">${esc(pName)}</h2>
              </div>
              <div class="parent-name-edit">
                <input id="${parentKey}NameInput" value="${esc(pName)}" style="max-width:150px;font-size:14px;font-weight:700;min-height:36px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;border-radius:6px">
                <button data-save-parent-name="${parentKey}" style="width:auto;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:white;padding:7px 12px;font-size:12px;font-weight:700">Save Name</button>
              </div>
            </div>
            <div style="display:flex;gap:18px;margin-top:16px;flex-wrap:wrap">
              <div><p style="margin:0;font-size:11px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase">Total Days</p><p style="margin:2px 0 0;font-size:22px;font-weight:800;color:white">${total}</p></div>
              <div><p style="margin:0;font-size:11px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase">Avg Stars</p><p style="margin:2px 0 0;font-size:22px;font-weight:800;color:white">${avgStars}★</p></div>
              <div><p style="margin:0;font-size:11px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase">Last 7 Days Avg</p><p style="margin:2px 0 0;font-size:22px;font-weight:800;color:white">${recentAvg}★</p></div>
              <div><p style="margin:0;font-size:11px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase">"Yes" Rate</p><p style="margin:2px 0 0;font-size:22px;font-weight:800;color:white">${metricPct}%</p></div>
            </div>
          </div>

          <!-- Star trend chart -->
          <h4 style="margin:0 0 8px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">★ Star Rating Trend (last 30 days)</h4>
          ${renderMiniBars(entries)}
          <div style="display:flex;gap:10px;margin-top:4px;font-size:11px;color:var(--muted)">
            <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>4-5★</span>
            <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--blue);display:inline-block"></span>3★</span>
            <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--rose);display:inline-block"></span>1-2★</span>
          </div>

          <!-- Metric "Yes" bar chart -->
          <h4 style="margin:16px 0 8px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">"Yes" vs "No" Over Time</h4>
          ${(() => {
            if (!entries.length) return '<p style="color:var(--muted);font-size:13px">No data yet.</p>';
            const bars = entries.map(([k,v]) => {
              const isYes = v.metric === "Yes";
              const isNT = v.metric === "No trigger today";
              const col = isYes ? "var(--green)" : isNT ? "var(--gold)" : "var(--rose)";
              return `<div class="mini-bar" style="height:40px;background:${col}" title="${k.split('|')[1]}: ${v.metric||'—'}"></div>`;
            }).join("");
            return `<div class="mini-bar-chart">${bars}</div>`;
          })()}
          <div style="display:flex;gap:10px;margin-top:4px;font-size:11px;color:var(--muted)">
            <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--green);display:inline-block"></span>Yes</span>
            <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--rose);display:inline-block"></span>No</span>
            ${metricOptions.includes("No trigger today") ? '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--gold);display:inline-block"></span>No trigger today</span>' : ''}
          </div>

          <!-- Download chart button -->
          <button data-download-parent-chart="${parentKey}" style="margin-top:16px;width:auto;font-size:13px">⬇ Download ${esc(pName)}'s Progress Charts (PDF)</button>

          <!-- Recent log -->
          <h4 style="margin:20px 0 8px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Recent Entries</h4>
          <div style="display:grid;gap:8px">
            ${entries.slice(-10).reverse().map(([k,v]) => {
              const d = k.split("|")[1];
              return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:6px;background:white">
                <div style="font-size:12px;font-weight:700;color:var(--muted);min-width:80px">${d}</div>
                <div style="flex:1"><span class="tag" style="background:${v.metric==='Yes'?'#d4f0e3':v.metric==='No trigger today'?'#fff3d7':'#fde8ec'};border-color:${v.metric==='Yes'?'var(--green)':v.metric==='No trigger today'?'var(--gold)':'var(--rose)'};color:${v.metric==='Yes'?'var(--green-dark)':v.metric==='No trigger today'?'var(--amber)':'var(--rose)'}">${esc(v.metric||"—")}</span></div>
                <div>${[1,2,3,4,5].map(n=>`<span style="color:${n<=(v.stars||0)?'#f5c518':'#ddd'};font-size:16px">★</span>`).join("")}</div>
              </div>`;
            }).join("") || '<div class="empty">No entries yet — submit a check-in on the Dashboard.</div>'}
          </div>
        </div>`;
      }

      return appShell(html`
        <div class="topbar">
          <div>
            <p class="eyebrow">Growth</p>
            <h2 class="page-title">Parent Trackers</h2>
            <p class="subtext">Track your own growth alongside your children. Streaks count only homeschool days for fairness.</p>
          </div>
        </div>

        <div class="section-title"><h3>${esc(p1Name)}</h3><span style="color:var(--muted);font-size:13px">Emotional Regulation</span></div>
        ${renderParentSummary("p1", p1Name, "Did I pause before speaking when triggered?", ["Yes","No","No trigger today"], ["Reactive","Partial","Mostly calm","Calm","Grounded"])}

        <div class="section-title"><h3>${esc(p2Name)}</h3><span style="color:var(--muted);font-size:13px">Nurturing Engagement</span></div>
        ${renderParentSummary("p2", p2Name, "Did I show Warm Curiosity Presence?", ["Yes","No"], ["Flat","Mostly flat","Mixed","Mostly warm","Consistently warm"])}
      `);
    }

    // ── STEP FORWARD PAGE ──
    function stepForwardView() {
      const child = state.children.find(c=>c.id===stepForwardChildId) || state.children[0];
      if (!child) return childView();
      const sub = visibleSubjects().find(s => s.id === stepForwardSubjectId) || visibleSubjects()[0];

      // Find current level for this child + subject
      let highestIdx = -1;
      for (let i = BLOOM.length - 1; i >= 0; i--) {
        const sfKey = `${child.id}|${sub.id}|${BLOOM[i]}`;
        if (state.completions[sfKey]) { highestIdx = i; break; }
      }
      const nextIdx = highestIdx + 1;
      const currentLevel = BLOOM[nextIdx] || BLOOM[BLOOM.length - 1];

      // Get checklist items for this subject + level
      const assessKey = `${sub.id}|${currentLevel}`;
      const checklistItems = (state.assessments[assessKey] || []).filter(a => a.type === "checklist");
      const quizItems = (state.assessments[assessKey] || []).filter(a => a.type === "quiz");

      // Get checklist check state
      const getChecked = (itemId) => Boolean(state.checklistDates[`${child.id}|${sub.id}|${currentLevel}|${itemId}`]);
      const getCheckedDate = (itemId) => state.checklistDates[`${child.id}|${sub.id}|${currentLevel}|${itemId}`];

      // Exam grade
      const examGradeData = state.examGrades[`${child.id}|${sub.id}|${currentLevel}`] || null;

      // Evidence notes
      const notes = state.evidenceNotes[`${child.id}|${sub.id}|${currentLevel}`] || [];

      // All checklist items checked?
      const allChecked = checklistItems.length > 0 && checklistItems.every(item => getChecked(item.id));

      return appShell(html`
        <div class="topbar">
          <div>
            <p class="eyebrow">Step Forward · ${esc(child.name)}</p>
            <h2 class="page-title">${sub.icon} ${esc(sub.label)}</h2>
            <p class="subtext">Current level to assess: <strong>${esc(currentLevel)}</strong> — ${esc(bloomPrompts[currentLevel])}</p>
          </div>
          <button class="secondary" data-child="${child.id}">← Back to Profile</button>
        </div>

        <!-- Bloom level badge -->
        <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span class="sbr-bloom-badge ${currentLevel.toLowerCase()}" style="font-size:15px;padding:8px 16px">${esc(child.name)} is working toward: ${esc(currentLevel)} in ${esc(sub.label)}</span>
        </div>

        <!-- Checklist -->
        <div class="section-title"><h3>📋 Assessment Checklist</h3></div>
        ${checklistItems.length === 0 ? `
          <div class="empty" style="margin-bottom:18px">No checklist items yet for ${esc(sub.label)} · ${esc(currentLevel)}. Add them under <strong>Add Assessments</strong> in the sidebar.</div>
        ` : `
          <div class="step-forward-page" style="margin-bottom:18px">
            ${checklistItems.map(item => {
              const checked = getChecked(item.id);
              const dateStr = getCheckedDate(item.id);
              return `
                <div class="checklist-item ${checked?"checked":""}" data-toggle-checklist="${child.id}|${sub.id}|${currentLevel}|${item.id}">
                  <div class="ci-check">${checked ? "✓" : ""}</div>
                  <div class="ci-text">
                    ${esc(child.name)} can ${esc(item.text)}
                    ${dateStr ? `<div class="ci-date">✓ Completed ${new Date(dateStr).toLocaleDateString()}</div>` : ""}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `}

        <!-- Quiz/Exam Grade Input -->
        ${quizItems.length > 0 ? `
          <div class="section-title"><h3>📝 Quiz / Exam</h3></div>
          <div class="card" style="margin-bottom:18px">
            <p style="margin:0 0 12px;font-size:13px;color:var(--muted)">Record a grade and upload a file for any quiz or exam administered at this level.</p>
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
              ${quizItems.map(q => `
                <div style="display:flex;align-items:center;gap:8px;font-size:13px">
                  <span class="tag">📝 ${esc(q.quizName)}</span>
                  ${q.canvaUrl ? `<a href="${esc(q.canvaUrl)}" target="_blank" rel="noreferrer">🎨 Open in Canva</a>` : `<a href="https://www.canva.com" target="_blank" rel="noreferrer" style="font-size:12px;color:var(--muted)">🎨 Open Canva</a>`}
                </div>
              `).join("")}
            </div>
            <div class="form-grid">
              <label>Grade / Score
                <input type="text" id="examGradeInput" placeholder="e.g. 85%, A, 9/10" value="${esc(examGradeData?.grade||"")}">
              </label>
              <label>Upload File
                <input type="file" id="examFileInput" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
              </label>
            </div>
            <div style="margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <button type="button" id="saveExamGrade" data-child="${child.id}" data-subject="${sub.id}" data-level="${currentLevel}">Save Grade</button>
              ${examGradeData ? `<span class="tag" style="background:#e8f6ed;color:var(--green-dark)">✓ Grade saved: ${esc(examGradeData.grade)}</span>` : ""}
              ${examGradeData?.fileName ? `<span class="tag">📎 ${esc(examGradeData.fileName)}</span>` : ""}
              ${examGradeData?.date ? `<span class="tag" style="background:#e8f6ed;color:var(--green-dark)">📅 Saved ${new Date(examGradeData.date).toLocaleDateString()}</span>` : ""}
            </div>
          </div>
        ` : ""}

        <!-- Evidence Notes -->
        <div class="section-title"><h3>🗒 Evidence Notes</h3></div>
        <div class="card" style="margin-bottom:18px">
          <div class="evidence-note-form">
            <label>Add Evidence Note
              <textarea id="evidenceNoteInput" placeholder="Describe what you observed, what the child said or did..." style="min-height:72px"></textarea>
            </label>
            <button type="button" id="addEvidenceNote" data-child="${child.id}" data-subject="${sub.id}" data-level="${currentLevel}" style="width:auto">Add Note</button>
          </div>
          ${notes.length > 0 ? `
            <div style="margin-top:14px;display:grid;gap:8px">
              ${notes.map(n => `
                <div style="border-left:4px solid var(--blue);padding:8px 12px;background:#f0f6fb;border-radius:0 6px 6px 0">
                  <div style="font-size:13px;line-height:1.5">${esc(n.text)}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:4px">${new Date(n.date).toLocaleString()}</div>
                </div>
              `).join("")}
            </div>
          ` : `<p style="color:var(--muted);font-size:13px;margin:10px 0 0">No notes yet.</p>`}
        </div>

        <!-- Mark Level Complete -->
        ${allChecked ? `
          <div style="background:linear-gradient(135deg,#e8f6ed,#e3f3fb);border:1px solid var(--green);border-radius:10px;padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <div>
              <strong style="font-size:16px;color:var(--green-dark)">🎉 All checklist items complete!</strong>
              <p style="margin:4px 0 0;color:var(--muted);font-size:13px">Mark this level complete to advance ${esc(child.name)} to the next Bloom level in ${esc(sub.label)}.</p>
            </div>
            <button data-complete-level="${child.id}|${sub.id}|${currentLevel}" style="white-space:nowrap">✓ Mark ${esc(currentLevel)} Complete</button>
          </div>
        ` : checklistItems.length > 0 ? `
          <div class="empty" style="margin-bottom:18px">Complete all ${checklistItems.length} checklist items to unlock the <em>Mark Complete</em> button.</div>
        ` : `
          <div style="margin-bottom:18px">
            <button data-complete-level="${child.id}|${sub.id}|${currentLevel}">✓ Mark ${esc(currentLevel)} Complete</button>
          </div>
        `}
      `);
    }

          if (items.length) criteriaBySubject[sub.id][level] = items;
        }
      }

      return appShell(html`
        <div class="topbar">

            <h2 class="page-title">Add Assessments</h2>
            <p class="subtext">Build your checklists and quiz items for each subject and Bloom level. These show up in the Step Forward page for each child.</p>

                  <span style="font-size:12px;color:var(--muted)">Can't find a subject? Add a custom one here.</span>

            <div class="assess-form-section">

                <div class="wide"><button type="button" id="addChecklistBtn" style="width:auto">+ Add to Checklist</button></div>
              </div>
            </div>

            <div class="assess-form-section">
              <h4>Quiz / Exam (optional)</h4>
              <p style="margin:0 0 10px;font-size:13px;color:var(--muted)">Give the quiz or exam a name, and optionally paste a link to the design in Canva so it's one click away.</p>

                  <a href="https://www.canva.com" target="_blank" rel="noreferrer"><button type="button" class="secondary" style="width:auto">🎨 Open Canva</button></a>
                </div>
              </div>
            </div>
          </form>
        </div>

        <!-- Saved Assessment Criteria -->
        <div class="section-title"><h3>📋 Saved Assessment Criteria</h3></div>
        ${visibleSubjects().map(sub => {
          const subData = criteriaBySubject[sub.id];

          return `
            <details class="assess-dropdown">
              <summary>${sub.icon} ${esc(sub.label)} <span style="color:var(--muted);font-weight:400;font-size:12px">(click to view levels)</span></summary>
              <div class="assess-dropdown-body">
                ${BLOOM.filter(l => subData[l]?.length).map(level => `
                  <details class="assess-level-dropdown">
                    <summary>${esc(level)} <span style="color:var(--muted);font-weight:400;font-size:11px">(${subData[level].length} item${subData[level].length!==1?"s":""})</span></summary>

                      ${subData[level].map(item => `
                        <div class="assess-criteria-item" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
                          <span>
                            ${item.type==="quiz" ? "📝 Quiz/Exam: " : "☐ My child can "}${esc(item.text||item.quizName||"")}
                            ${item.type==="quiz" && item.canvaUrl ? ` · <a href="${esc(item.canvaUrl)}" target="_blank" rel="noreferrer">🎨 Open in Canva</a>` : ""}

            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">

            </div>
            <span style="color:var(--muted)">${new Date(item.date).toLocaleString()}</span>
          </div>

      const node = nodeById(unit, item.nodeId);
      const interestLabel = item.interest ? INTEREST_LABELS[item.interest] : "";
      return html`

    function formatShortDate(dateText) {
      if (!dateText) return "";
      const date = new Date(dateText + "T12:00:00");
      return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }

    function slugify(value) {
      const base = String(value||"item").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"item";
      let id = base; let i = 2;
      const existing = new Set(units.flatMap(u=>[u.id,...u.nodes.map(n=>n[0])]));
      while (existing.has(id)) id = `${base}-${i++}`;
      return id;
    }

    // Find a trip's season + saved metadata by name (logs only store the trip name + date,
    // so we look the trip back up in state.fieldTrips to get its season icon/color).
    function ftTripByName(name) {
      for (const season of FT_SEASONS) {
        const trip = (state.fieldTrips[season.id] || []).find(t => t.name === name);
        if (trip) return { trip, season };
      }
      return { trip: null, season: null };
    }

    // Every logged field trip moment for one child, newest first. Reads the ftLogs entry
    // generically — whatever fields exist (notes, interest, image, video, etc.) come along
    // automatically as new logging features are added, with no changes needed here.
    function childFieldTripLogs(childId) {
      const out = [];
      for (const [logKey, log] of Object.entries(state.ftLogs || {})) {
        const parts = logKey.split("|");
        if (parts.length < 3) continue;
        const cid = parts[parts.length - 1];
        if (cid !== childId) continue;
        const tripName = parts.slice(1, -1).join("|");
        const dateIso = parts[0];
        const { trip, season } = ftTripByName(tripName);
        out.push({ logKey, tripName, dateIso, trip, season, ...log });
      }
      return out.sort((a, b) => new Date(b.date || b.dateIso) - new Date(a.date || a.dateIso));
    }
