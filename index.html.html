  <style>
    :root {
      color-scheme: light;
      --ink: #172522;
      --muted: #60746e;
      --line: #d2ddd9;
      --soft: #eef7f2;
      --paper: #ffffff;
      --green: #20835f;
      --green-dark: #145d45;
      --blue: #236fa6;
      --teal: #168a8a;
      --gold: #c6922e;
      --gold-soft: #fff3d7;
      --amber: #a66617;
      --rose: #a44155;
      --navy: #1d3461;
      --navy-soft: #e7edf7;
      --love: #2e7d55;
      --like: #2a7db5;
      --dislike: #a44155;
      --shadow: 0 16px 36px rgba(27, 52, 46, .12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 22% 8%, rgba(32, 131, 95, .16), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(35, 111, 166, .13), transparent 27%),
        linear-gradient(180deg, #f6faf7 0%, #e8f0ec 100%);
      color: var(--ink);
    }
    button, input, select, textarea { font: inherit; }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 13px;
      background: linear-gradient(135deg, var(--green-dark), var(--blue));
      color: white;
      cursor: pointer;
      min-height: 40px;
    }
    button.secondary {
      color: var(--ink);
      background: #e6ebe7;
      border: 1px solid var(--line);
    }
    button.icon {
      width: 40px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(49, 108, 168, .28);
      outline-offset: 2px;
    }
    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
    }
    aside {
      background: rgba(251, 253, 251, .92);
      backdrop-filter: blur(10px);
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--green), var(--teal) 52%, var(--blue));
      box-shadow: 0 8px 18px rgba(32, 131, 95, .22);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0;
    }
    .brand h1 { font-size: 18px; margin: 0; line-height: 1.05; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    nav { display: grid; gap: 7px; margin-bottom: 20px; }
    nav button {
      width: 100%;
      text-align: left;
      background: transparent;
      color: var(--ink);
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-start;
    }
    nav button.active {
      background: linear-gradient(135deg, #e8f6ed, #e9f4fb);
      border-color: #bfd7cf;
      color: var(--green-dark);
      font-weight: 700;
    }
    main { padding: 28px; min-width: 0; }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .eyebrow { color: var(--muted); font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin: 0 0 6px; }
    h2.page-title { font-size: clamp(25px, 3vw, 40px); line-height: 1.05; margin: 0; letter-spacing: 0; }
    .subtext { color: var(--muted); margin: 8px 0 0; max-width: 760px; line-height: 1.5; }
    .grid { display: grid; gap: 16px; }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      background: rgba(255, 255, 255, .94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
      min-width: 0;
    }
    .hero-panel {
      background: linear-gradient(135deg, #123d33, #156d61 48%, #236fa6);
      color: white;
      border: 0;
      position: relative;
      overflow: hidden;
    }
    .hero-panel::after {
      content: "";
      position: absolute;
      inset: auto -30px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255, 211, 121, .22);
    }
    .hero-panel .muted, .hero-panel .subtext, .hero-panel .eyebrow { color: rgba(255,255,255,.78); }
    .quote-panel {
      background: linear-gradient(135deg, #1a3a2e, #0d5244 45%, #1b4f72);
      color: white;
      border-radius: 12px;
      padding: 26px 30px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }
    .quote-panel::before {
      content: "\201C";
      position: absolute;
      top: -14px;
      left: 16px;
      font-size: 120px;
      line-height: 1;
      color: rgba(255,255,255,.1);
      font-family: Georgia, serif;
    }
    .quote-text {
      font-size: 18px;
      line-height: 1.65;
      font-style: italic;
      font-weight: 400;
      margin: 0 0 12px;
      position: relative;
      z-index: 1;
    }
    .quote-attr {
      font-size: 13px;
      color: rgba(255,255,255,.65);
      letter-spacing: .04em;
      position: relative;
      z-index: 1;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 26px 0 12px;
    }
    .section-title h3 { margin: 0; font-size: 19px; }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px 12px;
      background: #fff;
      color: var(--ink);
      min-height: 42px;
    }
    textarea { resize: vertical; min-height: 92px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }
    .form-grid .wide { grid-column: 1 / -1; }
    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }
    .unit-card {
      text-align: left;
      background: linear-gradient(145deg, white, #f3faf8);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 0;
      box-shadow: none;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s;
    }
    .unit-card:hover { box-shadow: 0 8px 24px rgba(32,131,95,.18); transform: translateY(-2px); }
    .unit-card:nth-child(3n + 2) .unit-img-wrap { background: linear-gradient(145deg, #eef6fc, #d8edf8); }
    .unit-card:nth-child(3n) .unit-img-wrap { background: linear-gradient(145deg, #fff7e4, #fde9be); }
    .unit-img-wrap {
      width: 100%;
      height: 120px;
      background: linear-gradient(145deg, #e8f5ef, #c8e8dd);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .unit-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .unit-img-placeholder { font-size: 44px; }
    .unit-card-body { padding: 14px 16px; }
    .unit-card h4 { margin: 0; font-size: 17px; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      background: #eef3ef;
      color: #375148;
      border: 1px solid #d7e1da;
    }
    .tag.gold { background: var(--gold-soft); border-color: #edd19a; color: #765417; }
    .list { display: grid; gap: 10px; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 13px;
      min-width: 0;
    }
    .row-main { min-width: 0; flex: 1; }
    .row h4 { margin: 0 0 4px; font-size: 16px; }
    .row p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.4; }
    .node-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
    }
    .world-entry {
      background: #20312a;
      color: white;
      border-radius: 8px;
      padding: 22px;
      line-height: 1.55;
      margin-bottom: 16px;
    }
    .world-entry[contenteditable="true"] {
      outline: 2px dashed rgba(255,255,255,.4);
      cursor: text;
    }
    .bloom-ladder { display: grid; gap: 11px; }
    .level {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 14px;
    }
    .level-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }
    .level h4 { margin: 0; font-size: 17px; }
    .level p { margin: 0; color: var(--muted); line-height: 1.45; }
    .history-item {
      display: grid;
      gap: 8px;
      border-left: 4px solid var(--blue);
      padding-left: 12px;
    }
    .attachment { max-width: 160px; max-height: 120px; border-radius: 6px; border: 1px solid var(--line); object-fit: cover; }
    .calendar-list { display: grid; gap: 10px; }
    .calendar-date {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      color: white;
      padding: 9px;
      font-weight: 800;
      text-align: center;
    }
    .empty {
      border: 1px dashed #bfcac4;
      background: rgba(255,255,255,.62);
      color: var(--muted);
      border-radius: 8px;
      padding: 18px;
      line-height: 1.45;
    }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button { color: var(--ink); background: white; border: 1px solid var(--line); }
    .tabs button.active { background: var(--green); border-color: var(--green); color: white; }
    .log-work-section {
      background: linear-gradient(135deg, #f0f9f4, #e8f4fb);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 22px;
    }
    .log-work-section h3 { margin: 0 0 16px; font-size: 20px; }
    .interest-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .interest-btn {
      flex: 1;
      min-width: 70px;
      background: white;
      color: var(--ink);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 8px 6px;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: all .15s;
    }
    .interest-btn.sel-5 { background: #d4f0e3; border-color: var(--green); color: var(--green-dark); }
    .interest-btn.sel-4 { background: #d4eaf9; border-color: var(--blue); color: #174d7a; }
    .interest-btn.sel-3 { background: #fff3d7; border-color: var(--gold); color: var(--amber); }
    .interest-btn.sel-2 { background: #fde8ec; border-color: var(--rose); color: var(--rose); }
    .interest-btn.sel-1 { background: #f5d0d7; border-color: #8b1f35; color: #8b1f35; }

    /* Pancha Kosha field trip rating rows (1–5 scale per dimension, each option labeled) */
    .kosha-dim { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: #fafcf8; }
    .kosha-dim-head { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
    .kosha-dim-head .kosha-label { font-size: 13px; font-weight: 700; color: var(--ink); }
    .kosha-dim-head .kosha-subtitle { font-size: 10.5px; color: var(--muted); font-weight: 600; }
    .kosha-dim-question { font-size: 11.5px; color: var(--muted); margin: 0 0 8px; line-height: 1.3; }
    .kosha-scale-row { display: grid; gap: 6px; }
    .kosha-chip {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      background: white;
      color: var(--ink);
      border: 2px solid var(--line);
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 12.5px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: all .15s;
      line-height: 1.25;
    }
    .kosha-chip .kosha-chip-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #eef3ef;
      color: var(--ink);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      transition: all .15s;
    }
    .kosha-chip:hover { border-color: var(--green); background: #f3faf8; }
    .kosha-chip.sel { background: linear-gradient(135deg,#e8f6ed,#e3f3fb); border-color: var(--green-dark); color: var(--green-dark); }
    .kosha-chip.sel .kosha-chip-num { background: linear-gradient(135deg,var(--green),var(--teal)); color: white; }
    .kosha-summary-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .kosha-summary-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; background: #eef7f2; border: 1px solid #cfe6da; color: var(--green-dark); border-radius: 999px; padding: 3px 9px; }
    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
    }
    .check-row input[type=checkbox] { width: 18px; min-height: 18px; }
    /* Calendar */
    .cal-mini {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin: 12px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 6px;
      background: white;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .cal-day.today { background: var(--green); color: white; border-color: var(--green); font-weight: 800; }
    .cal-day.has-work { background: var(--gold-soft); border-color: var(--gold); }
    .cal-day.other-month { color: #b8c4bf; }
    .cal-day.selected { box-shadow: 0 0 0 2px var(--blue); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; }
    /* Rename inline */
    .rename-inline { display: flex; gap: 8px; align-items: center; }
    .rename-inline input { min-height: 36px; font-size: 14px; }
    /* Upcoming nodes/materials side by side */
    .upcoming-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .upcoming-box { border: 1px solid var(--line); border-radius: 8px; background: white; padding: 14px; }
    .upcoming-box h4 { margin: 0 0 10px; font-size: 15px; }
    /* Assignment detail */
    .assignment-detail { border: 1px solid var(--line); border-radius: 8px; background: white; padding: 16px; margin-bottom: 10px; }
    .assignment-detail h4 { margin: 0 0 8px; }
    /* Subject grid */
    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .subject-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px 14px;
      text-align: center;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s;
      font-weight: 700;
      font-size: 15px;
      color: var(--ink);
    }
    .subject-card:hover { box-shadow: 0 8px 24px rgba(32,131,95,.18); transform: translateY(-2px); }
    .subject-card .subject-icon { font-size: 32px; display: block; margin-bottom: 8px; }
    /* Bloom assignment cards */
    .bloom-assignment-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .bloom-assignment-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      padding: 16px;
    }
    .bloom-assignment-card h5 {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--green-dark);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    /* Interest tracker */
    .interest-track-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 16px; }
    .interest-track-col { border-radius: 10px; padding: 16px; }
    .interest-track-col.love { background: linear-gradient(160deg, #e3f5ec, #c9e9d8); border: 1px solid #9fd4bb; }
    .interest-track-col.neutral { background: linear-gradient(160deg, #e8f2fb, #cce0f5); border: 1px solid #9ec5e7; }
    .interest-track-col.dislike { background: linear-gradient(160deg, #fbe8ec, #f5ced6); border: 1px solid #e5a3ae; }
    .interest-track-col h4 { margin: 0 0 12px; font-size: 15px; }
    /* Progress tracker visual */
    .progress-visual-wrap { margin-top: 16px; }
    .subject-bloom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #edf0ee;
    }
    .subject-bloom-row:last-child { border-bottom: 0; }
    .sbr-subject { width: 130px; font-size: 13px; font-weight: 700; color: var(--ink); flex-shrink: 0; }
    .sbr-bloom-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--green-dark), var(--blue));
      color: white;
    }
    .sbr-bloom-badge.notice { background: linear-gradient(135deg, #7ab0a0, #4d8a78); }
    .sbr-bloom-badge.remember { background: linear-gradient(135deg, #5b6f68, #3d5249); }
    .sbr-bloom-badge.understand { background: linear-gradient(135deg, #236fa6, #174d7a); }
    .sbr-bloom-badge.apply { background: linear-gradient(135deg, #168a8a, #0d5e5e); }
    .sbr-bloom-badge.analyze { background: linear-gradient(135deg, #c6922e, #a66617); }
    .sbr-bloom-badge.evaluate { background: linear-gradient(135deg, #7b4fa6, #5a3080); }
    .sbr-bloom-badge.create { background: linear-gradient(135deg, #a44155, #6e1f30); }
    .sbr-bloom-badge.refine { background: linear-gradient(135deg, #1a7a6e, #0f5247); }
    .sbr-bloom-badge.share { background: linear-gradient(135deg, #c6922e, #20835f); }
    .sbr-bloom-badge.mastered { background: linear-gradient(135deg, #20835f, #145d45); }
    /* Step Forward page */
    .step-forward-page { display: grid; gap: 18px; }
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: background .15s;
    }
    .checklist-item.checked { background: linear-gradient(135deg, #e8f6ed, #e3f3fb); border-color: var(--green); }
    .checklist-item .ci-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line); flex-shrink: 0; display: grid; place-items: center; font-size: 13px; margin-top: 1px; }
    .checklist-item.checked .ci-check { background: var(--green); border-color: var(--green); color: white; }
    .checklist-item .ci-text { flex: 1; font-size: 14px; line-height: 1.5; }
    .checklist-item .ci-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .medal-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0; }
    .medal-card { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 140px; }
    .medal-icon { font-size: 30px; flex-shrink: 0; }
    .medal-label { font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
    .medal-topic { font-size: 15px; font-weight: 700; color: var(--ink); }
    .medal-pts { font-size: 12px; color: var(--muted); }
    .least-interested { display: grid; gap: 8px; margin: 12px 0; }
    .least-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; background: #fff3f3; border: 1px solid #f5cdd4; font-size: 14px; }
    /* Evidence note */
    .evidence-note-form { display: grid; gap: 10px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #fafcfa; margin-top: 10px; }
    /* Add Assessments */
    .assess-form-section { border: 1px solid var(--line); border-radius: 8px; padding: 16px; background: #fafcfa; margin-bottom: 14px; }
    .assess-form-section h4 { margin: 0 0 12px; font-size: 16px; color: var(--green-dark); }
    .assess-criteria-block { border-left: 4px solid var(--green); padding: 10px 14px; margin-bottom: 10px; background: white; border-radius: 0 8px 8px 0; }
    .assess-criteria-block h5 { margin: 0 0 6px; font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--green-dark); }
    .assess-criteria-item { font-size: 13px; padding: 4px 0; color: var(--ink); border-bottom: 1px solid var(--line); }
    .assess-criteria-item:last-child { border-bottom: 0; }
    /* Add lessons single form */
    .add-lessons-form {
      display: grid;
      gap: 16px;
    }
    .add-form-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: #fafcfa;
    }
    .add-form-section h4 { margin: 0 0 12px; font-size: 16px; color: var(--green-dark); }
    /* Portfolio export button on child profile */
    .portfolio-btn {
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: white;
      font-size: 13px;
    }
    /* Editable node text */
    [contenteditable="true"] { cursor: text; }
    [contenteditable="true"]:focus { outline: 2px solid rgba(49,108,168,.4); border-radius: 4px; }
    /* Delete (corner) buttons on cards */
    .corner-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      width: 30px;
      min-height: 30px;
      padding: 0;
      font-size: 15px;
      line-height: 1;
      background: rgba(255,255,255,.92);
      color: var(--navy);
      border: 1px solid var(--line);
      box-shadow: 0 2px 8px rgba(27,52,46,.15);
    }
    .corner-delete:hover { background: var(--navy-soft); }
    /* Every "×" close/delete/remove button uses navy blue */
    .x-btn { color: var(--navy) !important; }
    .x-btn:hover { background: var(--navy-soft); }
    .unit-card, .subject-card-wrap { position: relative; }
    .subject-card-wrap .subject-card { width: 100%; }
    /* Assessment dropdown */
    .assess-dropdown { border: 1px solid var(--line); border-radius: 8px; background: white; margin-bottom: 10px; overflow: hidden; }
    .assess-dropdown > summary { cursor: pointer; padding: 12px 14px; font-weight: 700; font-size: 15px; list-style: none; display: flex; align-items: center; gap: 8px; }
    .assess-dropdown > summary::-webkit-details-marker { display: none; }
    .assess-dropdown > summary::before { content: "▸"; color: var(--muted); font-size: 12px; transition: transform .12s; }
    .assess-dropdown[open] > summary::before { content: "▾"; }
    .assess-dropdown-body { padding: 0 14px 12px; }
    .assess-level-dropdown { border: 1px solid var(--line); border-radius: 6px; background: #fafcfa; margin-bottom: 8px; }
    .assess-level-dropdown > summary { cursor: pointer; padding: 9px 12px; font-weight: 700; font-size: 13px; list-style: none; color: var(--green-dark); display:flex; align-items:center; gap:8px; }
    .assess-level-dropdown > summary::-webkit-details-marker { display: none; }
    .assess-level-dropdown > summary::before { content: "▸"; color: var(--muted); font-size: 11px; }
    .assess-level-dropdown[open] > summary::before { content: "▾"; }
    .assess-level-dropdown-body { padding: 0 12px 10px; }
    /* Media (video/image) preview blocks */
    .media-embed { width: 100%; aspect-ratio: 16/9; border: 0; border-radius: 6px; }
    .media-link-img { max-width: 100%; max-height: 220px; border-radius: 6px; border: 1px solid var(--line); object-fit: cover; }
    /* Progress history entries */
    .history-item.progress-item { border-left-color: var(--gold); }

    /* ── YEARBOOK ── */
    .yearbook-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; }
    .yearbook-cover {
      text-align: left;
      background: linear-gradient(150deg, #123d33, #156d61 55%, #236fa6);
      color: white;
      border: 0;
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 14px 32px rgba(18,61,51,.28);
      transition: transform .15s, box-shadow .15s;
      min-height: 200px;
    }
    .yearbook-cover:hover { transform: translateY(-3px) rotate(-0.3deg); box-shadow: 0 20px 40px rgba(18,61,51,.36); }
    .yearbook-cover::after {
      content: ""; position: absolute; inset: auto -40px -60px auto;
      width: 180px; height: 180px; border-radius: 50%; background: rgba(255,211,121,.16);
    }
    .yearbook-cover-thumbs { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; height: 110px; overflow: hidden; }
    .yearbook-cover-thumbs img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .yearbook-cover-thumbs .ph-placeholder { display: grid; place-items: center; background: rgba(255,255,255,.08); font-size: 26px; }
    .yearbook-cover-body { padding: 14px 18px 18px; position: relative; z-index: 1; }
    .yearbook-cover-body h4 { margin: 0 0 4px; font-size: 18px; }
    .yearbook-cover-body p { margin: 0; font-size: 12.5px; color: rgba(255,255,255,.78); }
    .yearbook-cover-badge {
      position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.3); border-radius: 999px; padding: 4px 10px;
      font-size: 11px; font-weight: 700; backdrop-filter: blur(2px);
    }
    .yb-page {
      background: linear-gradient(160deg, #fffdf6, #fff7e4);
      border: 1px solid #edd19a;
      border-radius: 14px;
      padding: 26px 28px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }
    .yb-month-title {
      display: flex; align-items: center; gap: 10px; margin: 0 0 14px;
      font-size: 20px; color: var(--green-dark); font-weight: 800;
    }
    .yb-month-title .yb-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
    .yb-child-heading {
      display: inline-flex; align-items: center; gap: 8px; margin: 18px 0 10px;
      font-size: 14px; font-weight: 800; color: var(--green-dark);
      background: #eef7f2; border: 1px solid #cfe6da; border-radius: 999px; padding: 5px 14px;
    }
    .yb-collage {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 6px;
    }
    .yb-card {
      background: #fff;
      border-radius: 4px;
      padding: 10px 10px 14px;
      box-shadow: 0 6px 16px rgba(27,52,46,.16);
      border: 1px solid #f0e6c8;
      transition: transform .15s;
      display: flex; flex-direction: column; gap: 8px;
    }
    .yb-card:nth-child(3n+1) { transform: rotate(-1.1deg); }
    .yb-card:nth-child(3n+2) { transform: rotate(0.8deg); }
    .yb-card:nth-child(3n)   { transform: rotate(-0.4deg); }
    .yb-card:hover { transform: scale(1.03) rotate(0deg); z-index: 2; }
    .yb-card-media { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 2px; overflow: hidden; background: #eef3ef; display: grid; place-items: center; }
    .yb-card-media img { width: 100%; height: 100%; object-fit: cover; }
    .yb-card-media .yb-play { position: absolute; inset: 0; display: grid; place-items: center; background: rgba(0,0,0,.18); }
    .yb-card-media .yb-play span { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,.92); display: grid; place-items: center; font-size: 14px; color: var(--green-dark); }
    .yb-card-media .ph-placeholder { font-size: 30px; color: var(--muted); }
    .yb-card-cap { font-size: 11.5px; color: var(--ink); line-height: 1.35; }
    .yb-card-cap .yb-date { display: block; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 2px; }
    .yb-card-cap .yb-tag-mini { display: inline-block; margin-top: 4px; font-size: 10px; background: var(--gold-soft); color: #765417; border-radius: 999px; padding: 1px 7px; }
    .yb-lightbox {
      position: fixed; inset: 0; background: rgba(10,20,18,.86); z-index: 9999;
      display: grid; place-items: center; padding: 24px; cursor: zoom-out;
    }
    .yb-lightbox img, .yb-lightbox iframe { max-width: min(90vw, 900px); max-height: 84vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .yb-lightbox iframe { width: min(90vw, 900px); aspect-ratio: 16/9; height: auto; border: 0; }
    .yb-lightbox-cap { color: white; max-width: 700px; text-align: center; margin-top: 14px; font-size: 13px; line-height: 1.5; }

    /* Media */
    @media (max-width: 980px) {
      .app-shell { display: block; }
      aside { position: static; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cols-4, .cols-3, .cols-2, .node-layout, .interest-track-cols, .upcoming-grid, .bloom-assignment-grid { grid-template-columns: 1fr; }
      main { padding: 18px; }
    }
    @media (max-width: 640px) {
      .topbar { display: grid; }
      .form-grid { grid-template-columns: 1fr; }
      .row { flex-wrap: wrap; }
      button { width: 100%; }
      button.icon { width: 40px; }
      .subject-grid { grid-template-columns: repeat(2, 1fr); }
      .interest-track-cols { grid-template-columns: 1fr; }
      .yb-collage { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  
    /* ── PARENT TRACKER STYLES ── */
    .parent-profile-card {
      background: linear-gradient(135deg, #1a3a2e, #0d5244 48%, #1b4f72);

      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .parent-profile-card::after {
      content: "";
      position: absolute;
      inset: auto -20px -60px auto;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,211,121,.15);
    }
    .parent-tracker-card {
      background: rgba(255,255,255,.97);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 14px;

    .star-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }

      border-radius: 6px;

    .ft-stat { display:flex;flex-direction:column;align-items:center;min-width:60px; }

  <div id="app"></div>
  <script>
    const BLOOM = ["Notice", "Remember", "Understand", "Apply", "Analyze", "Evaluate", "Create", "Refine", "Share"];

    // ── GOOGLE API CONFIGURATION ──
    // Replace these placeholder values with your real credentials from
    // https://console.cloud.google.com before enabling Google sign-in.
    const GOOGLE_CLIENT_ID = "";   // ← your OAuth 2.0 client ID
    const GOOGLE_API_SCOPES = "openid email profile";

    // Tracks initialization state so other modules can gate on readiness.
    const googleAuth = {
      ready: false,  // true once GIS has initialised
      user:  null,   // { id, name, email, picture } — populated after sign-in
      token: null,   // raw credential JWT — stored in memory only, never persisted
    };

    /**
     * initGoogleAuth()
     * Called once on page load (see bottom of script).
     * Initialises Google Identity Services so the app is ready to present
     * a sign-in flow whenever the UI needs one.  No UI is rendered here.
     */
    function initGoogleAuth() {
      // Guard: GIS script must be present and a client ID must be configured.
      if (typeof google === "undefined" || !google.accounts) {
        console.warn("[GSA LMS] Google Identity Services not loaded — skipping auth init.");
        return;
      }
      if (!GOOGLE_CLIENT_ID) {
        console.info("[GSA LMS] GOOGLE_CLIENT_ID not set — Google auth disabled.");
        return;
      }
      try {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          // callback will be wired up when the sign-in UI is built in a future step
          callback: _handleGoogleCredential,
          auto_select: false,
          cancel_on_tap_outside: true,
        });
        googleAuth.ready = true;
        console.info("[GSA LMS] Google Identity Services initialised.");
      } catch (err) {
        console.error("[GSA LMS] Google auth init failed:", err);
      }
    }

    /**
     * _handleGoogleCredential(response)
     * Receives the signed JWT from GIS after the user completes Google sign-in.
     * Decodes the payload, stores user info and the raw token in memory only
     * (nothing is written to localStorage or sessionStorage at this stage),
     * then re-renders the UI so the sidebar widget updates immediately.
     */
    function _handleGoogleCredential(response) {
      if (!response?.credential) return;
      try {
        const payload = JSON.parse(atob(response.credential.split(".")[1]));
        googleAuth.token = response.credential; // JWT — in memory only
        googleAuth.user  = {
          id:      payload.sub,
          name:    payload.name,
          email:   payload.email,
          picture: payload.picture,
        };
        console.info("[GSA LMS] Signed in as:", googleAuth.user.email);
        render(); // refresh sidebar widget to show signed-in state
      } catch (err) {
        console.error("[GSA LMS] Failed to decode Google credential:", err);
      }
    }

    /**
     * signOutGoogle()
     * Clears the in-memory auth state and revokes the GIS session so the
     * One Tap prompt can appear again on the next sign-in attempt.
     * Nothing is removed from localStorage (there is nothing there to remove).
     */
    function signOutGoogle() {
      const email = googleAuth.user?.email;
      googleAuth.token = null;
      googleAuth.user  = null;
      if (typeof google !== "undefined" && google.accounts?.id) {
        google.accounts.id.disableAutoSelect();
        if (email) google.accounts.id.revoke(email, () => {});
      }
      console.info("[GSA LMS] Signed out.");
      render(); // refresh sidebar widget to show signed-out state
    }

    // ── GOOGLE SHEETS CONFIGURATION ──
    // Fill in these values from https://console.cloud.google.com and your Sheet URL.
    const GOOGLE_API_KEY   = "";   // ← API key (used for gapi client initialisation)
    const GOOGLE_SHEET_ID  = "";   // ← the long ID from your Sheet URL
    const GOOGLE_SHEET_TAB = "Sheet1"; // ← tab name to read/write (adjust as needed)

    // Runtime state for the Sheets connection.
    const sheetsConnection = {
      ready:       false,  // true once gapi + Sheets API are loaded
      tokenClient: null,   // OAuth2 token client (wired in a future step)
    };

    /**
     * _loadSheetsApi()
     * Internal helper — called during startup after GIS is ready.
     * Loads the gapi client library, then loads the Sheets v4 discovery doc
     * so the app can call gapi.client.sheets.* in a future step.
     * Returns a Promise that resolves when the API is ready, or rejects on error.
     */
    function _loadSheetsApi() {
      return new Promise((resolve, reject) => {
        if (typeof gapi === "undefined") {
          reject(new Error("gapi not loaded"));
          return;
        }
        gapi.load("client", async () => {
          try {
            await gapi.client.init({
              apiKey:        GOOGLE_API_KEY,
              discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"],
            });
            sheetsConnection.ready = true;
            console.info("[GSA LMS] Google Sheets API client ready.");
            resolve();
          } catch (err) {
            console.error("[GSA LMS] Sheets API init failed:", err);
            reject(err);
          }
        });
      });
    }

    /**
     * connectToSheet()
     * Public entry-point for establishing a Sheets connection.
     * Validates configuration, ensures the API client is loaded, then confirms
     * the target sheet is reachable.  Data reading/writing is handled separately
     * in a future step.
     *
     * Returns a Promise that resolves with a status object, or rejects on error.
     *
     * Usage (future step):
     *   connectToSheet().then(status => console.log(status));
     */
    async function connectToSheet() {
      // Guard: credentials must be configured before this can do real work.
      if (!GOOGLE_CLIENT_ID) {
        console.warn("[GSA LMS] connectToSheet: GOOGLE_CLIENT_ID not set.");
        return { ok: false, reason: "missing_client_id" };
      }
      if (!GOOGLE_API_KEY) {
        console.warn("[GSA LMS] connectToSheet: GOOGLE_API_KEY not set.");
        return { ok: false, reason: "missing_api_key" };
      }
      if (!GOOGLE_SHEET_ID) {
        console.warn("[GSA LMS] connectToSheet: GOOGLE_SHEET_ID not set.");
        return { ok: false, reason: "missing_sheet_id" };
      }

      // Ensure the Sheets API client has been loaded.
      if (!sheetsConnection.ready) {
        try {
          await _loadSheetsApi();
        } catch (err) {
          return { ok: false, reason: "api_load_failed", error: err };
        }
      }

      // Probe the target sheet to confirm reachability (reads spreadsheet metadata only).
      // This will succeed only once an OAuth token is available (future step).
      try {
        const res = await gapi.client.sheets.spreadsheets.get({
          spreadsheetId: GOOGLE_SHEET_ID,
          fields:        "spreadsheetId,properties/title",
        });
        const title = res.result?.properties?.title ?? "(unknown)";
        console.info(`[GSA LMS] Connected to sheet: "${title}" (${GOOGLE_SHEET_ID})`);
        return { ok: true, sheetId: GOOGLE_SHEET_ID, title };
      } catch (err) {
        // 401/403 before sign-in is expected at this stage — not an app error.
        const status = err?.status ?? err?.result?.error?.code;
        if (status === 401 || status === 403) {
          console.info("[GSA LMS] connectToSheet: auth required — sign-in not yet implemented.");
          return { ok: false, reason: "auth_required" };
        }
        console.error("[GSA LMS] connectToSheet: unexpected error:", err);
        return { ok: false, reason: "unknown_error", error: err };
      }
    }

    /**
     * buildGCalEventUrl(item)
     * Returns a "Add to Google Calendar" URL for a scheduled lesson item.
     * Opens a pre-filled Google Calendar new-event page in a new tab.
     */
    function buildGCalEventUrl(item) {
      const iUnit = unitById(item.unitId);
      const iNode = nodeById(iUnit, item.nodeId);
      const childLabel = item.childId ? childName(item.childId) : "Any child";
      const title = encodeURIComponent(`${childLabel}: ${iUnit.name} / ${iNode[1]} (${item.level})`);
      const details = encodeURIComponent(
        [item.nodeText, item.materialsText ? "Materials: " + item.materialsText : ""].filter(Boolean).join("\n\n")
      );
      // Build date strings: Google Calendar uses YYYYMMDDTHHmmSSZ format for all-day we use DATE/DATE+1
      const [y, m, d] = item.date.split("-");
      const dateNext = new Date(Number(y), Number(m) - 1, Number(d) + 1);
      const endDate = `${dateNext.getFullYear()}${String(dateNext.getMonth()+1).padStart(2,"0")}${String(dateNext.getDate()).padStart(2,"0")}`;
      const startDate = `${y}${m}${d}`;
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startDate}/${endDate}&details=${details}`;
    }

      state.ftLogs ||= {};
      Object.keys(state.calFieldTrips).forEach(k => {
        if (typeof state.calFieldTrips[k] === "string") {
          state.calFieldTrips[k] = [state.calFieldTrips[k]];
        }
      });
      // Merge custom subjects into SUBJECTS list
      for (const cs of state.customSubjects) {
        if (!SUBJECTS.find(s => s.id === cs.id)) SUBJECTS.push(cs);
      }
      units = state.curriculum;
      units.forEach(unit => {
        unit.nodes ||= [];
        unit.emoji ||= "📖";
        unit.nodes = unit.nodes.map(node => {
          if (Array.isArray(node)) {
            // Ensure node has subjectId at index 3 (default empty = appears under all subjects)
            return node;
          }
          return [node.id || crypto.randomUUID(), node.name || "Untitled Topic", node.entry || "", node.subjectId || ""];
        });
      });
      // ── CURRICULUM MIGRATION ──
      // Saved sessions freeze whatever curriculum existed the first time this
      // app ran in that browser. If this HTML file is later updated with new
      // units or new topics/nodes on an existing unit, those additions would
      // otherwise never appear for a family who already has saved data — the
      // saved (older) curriculum always wins. To fix that, merge in anything
      // present in the active curriculum template that isn't already in the saved curriculum,
      // while still respecting units/nodes the user explicitly deleted.
      for (const defaultUnit of activeDefaultUnits) {
        if (state.deletedUnitIds.includes(defaultUnit.id)) continue;
        let unit = units.find(u => u.id === defaultUnit.id);
        if (!unit) {

    // except any subjects listed in its hideFromSubjects list (node[4]) — used when a shared topic
    // is "removed" from one subject without deleting it everywhere.
    function topicsForSubject(unit, subjectId) {
      return unit.nodes.filter(n => {
        if (n[3]) return n[3] === subjectId; // subject-specific topic
        const hideFrom = n[4] || [];
        return !hideFrom.includes(subjectId); // shared topic, unless hidden from this subject
      });
    }
    function key(childId, unitId, nodeId, level) { return [childId, unitId, nodeId, level].join("|"); }
    function isDone(childId, unitId, nodeId, level) { return Boolean(state.completions[key(childId, unitId, nodeId, level)]); }
    function completedLevels(childId, unitId, nodeId) { return BLOOM.filter(l => isDone(childId, unitId, nodeId, l)); }
    function currentLevel(childId, unitId, nodeId) {
      const first = BLOOM.find(l => !isDone(childId, unitId, nodeId, l));

    // ── SCHOOL YEAR HELPERS (shared by Portfolio PDF export and the Yearbook) ──
    // School year convention: Aug 1 of `startYear` → Jul 31 of `startYear + 1`.
    function schoolYearStartYear(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d)) return null;
      const m = d.getMonth(); // 0=Jan ... 7=Aug
      return m >= 7 ? d.getFullYear() : d.getFullYear() - 1;
    }
    function schoolYearLabel(startYear) {
      return `Aug ${startYear} – Jul ${parseInt(startYear) + 1}`;
    }
    function inSchoolYearGlobal(dateStr, startYear) {
      if (startYear === "all" || startYear == null) return true;
      const d = new Date(dateStr);
      const yr = parseInt(startYear);
      const start = new Date(yr, 7, 1);
      const end = new Date(yr + 1, 6, 31, 23, 59, 59);
      return d >= start && d <= end;
    }
    // Every school year that has at least one evidence entry (including field trip media), newest first.
    function yearbookAvailableYears() {
      const set = new Set();
      for (const ev of state.evidence) {
        const sy = schoolYearStartYear(ev.date);
        if (sy != null) set.add(sy);
      }
      // Also include school years that only have field trip logs
      for (const [logKey] of Object.entries(state.ftLogs || {})) {
        const dateIso = logKey.split("|")[0];
        if (dateIso && /^\d{4}-\d{2}-\d{2}$/.test(dateIso)) {
          const sy = schoolYearStartYear(dateIso + "T12:00:00");
          if (sy != null) set.add(sy);
        }
      }
      // And years from visit photos attached to specific past visits
      for (const [visitKey] of Object.entries(state.ftVisitMedia || {})) {
        const [tripId, viStr] = visitKey.split("|");
        const vi = Number(viStr);
        for (const season of FT_SEASONS) {
          const trip = (state.fieldTrips?.[season.id] || []).find(t => t.id === tripId);
          if (!trip) continue;
          const visit = trip.visits[vi];
          if (!visit) continue;
          const dateIso = visit.date || visit;
          if (dateIso && /^\d{4}-\d{2}-\d{2}$/.test(dateIso)) {
            const sy = schoolYearStartYear(dateIso + "T12:00:00");
            if (sy != null) set.add(sy);
          }
          break;
        }
      }
      return Array.from(set).sort((a, b) => b - a);
    }
    // Get assignment count for a topic (node) — based on logged evidence, unless explicitly overridden
    function assignmentCountForNode(unitId, nodeId) {
      const overrideKey = unitId + "|" + nodeId;
      if (state.assignmentCounts[overrideKey]) return state.assignmentCounts[overrideKey];
      const nums = state.evidence
        .filter(e => e.unitId === unitId && e.nodeId === nodeId && e.assignmentNum)
        .map(e => Number(e.assignmentNum));
      return nums.length ? Math.max(...nums) : 3; // default 3
    }

    // Returns an array of {value, label} for all nodes within a topic,
    // using saved titles where available. Used by the Log Work node dropdown.
    function nodeOptionsForTopic(unitId, topicId) {
      const node1Title = state.nodeTexts?.[unitId+"|"+topicId+"|title"] || "";
      const options = [{ value: unitId+"|"+topicId+"|node1", label: "Node 1" + (node1Title ? " — " + node1Title : "") }];
      const extraKeys = Object.keys(state.nodeTexts || {})
        .filter(k => k.startsWith(unitId+"|"+topicId+"|node") && !k.endsWith("|materials") && !k.endsWith("|title"))
        .sort();
      extraKeys.forEach((k, i) => {
        const title = state.nodeTexts[k+"|title"] || "";
        const suffix = k.split("|").pop(); // e.g. "node2"
        const num = suffix.replace("node","");
        options.push({ value: k, label: "Node " + num + (title ? " — " + title : "") });
      });
      return options;
    }

    // Display label for a saved node-instance value, e.g. "Node 2 — Plant Cells"
    function nodeInstanceLabel(value) {
      if (!value) return "";
      const parts = value.split("|");
      const suffix = parts.pop() || ""; // e.g. "node1" or "node2"
      const num = suffix.replace("node", "");
      const base = parts.join("|"); // unitId|topicId
      const title = suffix === "node1"
        ? (state.nodeTexts?.[base+"|title"] || "")
        : (state.nodeTexts?.[value+"|title"] || "");
      return "Node " + num + (title ? " — " + title : "");
    }

    // Convert a YouTube URL into an embeddable URL, if possible
    function youtubeEmbedUrl(url) {
      if (!url) return "";
      try {
        const u = new URL(url);
        if (u.hostname.includes("youtu.be")) {
          const id = u.pathname.replace(/^\//, "");
          return id ? `https://www.youtube.com/embed/${id}` : "";
        }
        if (u.hostname.includes("youtube.com")) {
          if (u.pathname === "/watch") {
            const id = u.searchParams.get("v");
            return id ? `https://www.youtube.com/embed/${id}` : "";
          }
          if (u.pathname.startsWith("/embed/")) return url;
          if (u.pathname.startsWith("/shorts/")) {
            const id = u.pathname.split("/")[2];
            return id ? `https://www.youtube.com/embed/${id}` : "";
          }
        }
      } catch(e) {}
      return "";
    }

    // Extract a YouTube thumbnail image URL from any supported link shape, for collage use.
    function youtubeThumbUrl(url) {
      if (!url) return "";
      try {
        const u = new URL(url);
        let id = "";
        if (u.hostname.includes("youtu.be")) id = u.pathname.replace(/^\//, "");
        else if (u.hostname.includes("youtube.com")) {
          if (u.pathname === "/watch") id = u.searchParams.get("v") || "";
          else if (u.pathname.startsWith("/embed/")) id = u.pathname.split("/")[2] || "";
          else if (u.pathname.startsWith("/shorts/")) id = u.pathname.split("/")[2] || "";
        }
        return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : "";
      } catch(e) { return ""; }
    }

    // Returns the Sunday-to-Saturday week containing today (resets every Saturday night)
    function currentWeekRange() {
      const today = new Date();
      today.setHours(0,0,0,0);
      const dow = today.getDay(); // 0 = Sunday
      const start = new Date(today);
      start.setDate(today.getDate() - dow);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      return [start, end];
    }
    function dateInRange(dateText, start, end) {
      if (!dateText) return false;
      const d = new Date(dateText + "T00:00:00");
      return d >= start && d <= end;
    }

    function html(strings, ...values) {
      return strings.reduce((out, str, i) => out + str + (values[i] ?? ""), "");
    }
    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
    }

    function nodePrompt(nodeName, level) {
      const t = {
        Notice: `Observe and wonder about ${nodeName} in your daily life. What do you see, hear, or feel?`,
        Remember: `Recall important words, people, objects, actions, or facts connected to ${nodeName}.`,
        Understand: `Explain how ${nodeName} works and describe it in everyday language.`,
        Apply: `Use what you know about ${nodeName} in a hands-on task, story, model, or real situation.`,
        Analyze: `Compare parts of ${nodeName}, sort examples, find relationships, or explain causes and effects.`,
        Evaluate: `Make a reasoned judgment about ${nodeName} and support it with evidence or criteria.`,
        Create: `Create an original product, performance, plan, design, or explanation that uses ${nodeName}.`,
        Refine: `Look back at your work on ${nodeName} and improve it — what would you change, add, or deepen?`,
        Share: `Present, display, or teach what you have learned about ${nodeName} to an audience.`
      };
      return t[level];
    }

    function miniCalendar() {
      const now = calCalMonth;
      const year = now.getFullYear();
      const month = now.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const daysWithWork = new Set(
        state.evidence.map(e => {
          const d = new Date(e.date);
          return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        })
      );
      const daysOff = new Set(state.calDaysOff || []);
      const fieldTrips = state.calFieldTrips || {};
      const calNotes = state.calNotes || {};
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const dowLabels = ["Su","Mo","Tu","We","Th","Fr","Sa"];
      let days = "";
      for (let i = 0; i < firstDay; i++) {
        const d = new Date(year, month, -firstDay + i + 1);
        days += `<div class="cal-day other-month">${d.getDate()}</div>`;
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
        const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const dow = new Date(year, month, d).getDay(); // 0=Sun, 4=Thu, 5=Fri
        const hasWork = daysWithWork.has(`${year}-${month}-${d}`);
        const isDayOff = daysOff.has(dateStr);
        const dayTrips = Array.isArray(fieldTrips[dateStr]) ? fieldTrips[dateStr] : (fieldTrips[dateStr] ? [fieldTrips[dateStr]] : []);
        const isFieldTrip = dayTrips.length > 0;
        const hasNotes = (calNotes[dateStr] || []).length > 0;
        const isThursday = dow === 4;
        // BHHR Co-op: Thursdays 12–2 get rainbow treatment
        const isBHHR = isThursday && !isDayOff;

        let cls = "cal-day";
        let inner = String(d);
        let extraStyle = "";

        if (isDayOff) {
          cls += " day-off";
          inner = `<span title="Day Off">⛔ ${d}</span>`;
        } else if (isFieldTrip) {
          cls += " field-trip";
          const tripTitle = esc(dayTrips.join(" • "));
          const badge = dayTrips.length > 1 ? ` ×${dayTrips.length}` : "";
          inner = `<span title="${tripTitle}" style="font-size:9px;line-height:1.1;text-align:center">🚌${badge}<br>${d}</span>`;
        } else if (isBHHR) {
          cls += " bhhr-coop";
          inner = `<span title="BHHR Co-op 12–2pm" style="font-size:9px;line-height:1.1;text-align:center">🌈<br>${d}</span>`;
        } else if (isToday) {
          cls += " today";
        } else if (hasWork) {
          cls += " has-work";
        }

        // Note dot: shown on any day that has notes (overlaid in bottom-right corner)
        const noteDot = hasNotes
          ? `<span title="${(calNotes[dateStr]||[]).length} note${(calNotes[dateStr]||[]).length===1?'':'s'}" style="position:absolute;bottom:2px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--blue);display:block"></span>`
          : "";

        days += `<div class="${cls}" data-cal-date="${dateStr}" style="position:relative">${inner}${noteDot}</div>`;
      }
      // Fill trailing cells to complete the last row
      const totalCells = firstDay + daysInMonth;
      const remainder = totalCells % 7;
      if (remainder !== 0) {
        for (let i = 1; i <= 7 - remainder; i++) {
          days += `<div class="cal-day other-month">${i}</div>`;
        }
      }

      return `
        <div class="card" style="margin-bottom:0">
          <div class="cal-header">

    // ── TOPIC → NODES PAGE ──
    function topicNodeView() {
      const unit = unitById(selectedUnitId);
      const topic = nodeById(unit, selectedNodeId);
      const subject = visibleSubjects().find(s => s.id === selectedSubjectId) || visibleSubjects()[0];

      // Each topic currently holds one node (node text + materials).
      // We surface it as "Node 1" and support additional nodes stored as
      // nodeTexts[unitId|nodeId|node2], nodeTexts[unitId|nodeId|node2|materials], etc.
      // Node 1 is always the primary entry; extra nodes are keyed with a suffix.
      const node1Text = state.nodeTexts?.[unit.id+"|"+topic[0]] || topic[2] || "";
      const node1Mats = state.nodeTexts?.[unit.id+"|"+topic[0]+"|materials"] || "";
      const node1Title = state.nodeTexts?.[unit.id+"|"+topic[0]+"|title"] || "";

      // Gather any extra nodes (node2, node3…) stored under this topic
      const extraNodeKeys = Object.keys(state.nodeTexts || {})
        .filter(k => k.startsWith(unit.id+"|"+topic[0]+"|node") && !k.endsWith("|materials") && !k.endsWith("|title"))
        .sort();
      // Build a full list: node 1 always first, then extras
      const allNodes = [
        { key: unit.id+"|"+topic[0], matKey: unit.id+"|"+topic[0]+"|materials", titleKey: unit.id+"|"+topic[0]+"|title", text: node1Text, mats: node1Mats, title: node1Title, idx: 1 },
        ...extraNodeKeys.map((k, i) => ({
          key: k,
          matKey: k+"|materials",
          titleKey: k+"|title",
          text: state.nodeTexts[k] || "",
          mats: state.nodeTexts[k+"|materials"] || "",
          title: state.nodeTexts[k+"|title"] || "",
          idx: i + 2
        }))
      ];

      return appShell(html`
        <div class="topbar">
          <div>
            <p class="eyebrow">Unit: ${esc(unit.name)} · Subject: ${esc(subject.label)} · Topic: ${esc(topic[1])}</p>
            <h2 class="page-title">Nodes</h2>
          </div>
          <button class="secondary" data-open-subject="${unit.id}|${subject.id}">← Topics</button>
        </div>

        <div class="list">
          ${allNodes.map(node => `
            <div class="row" style="align-items:flex-start;gap:14px">
              <div class="row-main" style="min-width:0;display:grid;gap:10px">

                <!-- Node number + editable title -->
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="font-weight:800;font-size:15px;color:var(--ink);white-space:nowrap">Node ${node.idx}</span>
                  <input
                    type="text"
                    data-node-title="${node.titleKey}"
                    value="${esc(node.title)}"
                    placeholder="Add a title…"
                    style="flex:1;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:14px;font-weight:600;background:#fff;color:var(--ink)"
                  >
                </div>

                <!-- Node text (editable) -->
                <div
                  contenteditable="true"
                  data-node-text="${node.key}"
                  style="background:#20312a;color:white;border-radius:8px;padding:14px 18px;font-size:14px;line-height:1.6;min-height:52px;cursor:text;outline:none"
                >${esc(node.text || "Click to add node text…")}</div>

                <!-- Node materials (editable) -->
                <div style="background:#f8fbf9;border:1px solid var(--line);border-radius:8px;padding:12px 14px">
                  <strong style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">🎒 Node ${node.idx} Materials</strong>
                  <div
                    contenteditable="true"
                    data-node-text="${node.matKey}"
                    style="margin-top:6px;font-size:14px;line-height:1.55;color:var(--ink);min-height:32px;outline:none;border-radius:4px;padding:5px 8px;background:white;border:1px dashed #c8d8d0;cursor:text"
                  >${esc(node.mats || "Click to add materials…")}</div>
                  <div style="margin-top:10px">
                    <p style="margin:0 0 5px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">🎬 Node Video Link</p>
                    <input
                      type="url"
                      data-node-video="${node.key}"
                      placeholder="https://www.youtube.com/watch?v=..."
                      value="${esc(state.nodeVideos?.[node.key] || "")}"
                      style="width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:13px;background:#fff;color:var(--ink)"
                    >
                    ${(() => {
                      const vid = state.nodeVideos?.[node.key] || "";
                      const embed = youtubeEmbedUrl(vid);
                      return embed ? `<div style="margin-top:8px"><iframe class="media-embed" src="${esc(embed)}" title="Node video" allowfullscreen></iframe></div>` : "";
                    })()}
                  </div>
                </div>
              </div>

              <!-- Actions column -->
              <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;padding-top:36px">
                <button data-open-assignments="${unit.id}|${topic[0]}|${subject.id}" style="white-space:nowrap">View Assignments →</button>
                ${node.idx > 1 ? `<button class="icon secondary x-btn" title="Delete Node ${node.idx}" data-delete-extra-node="${node.key}" style="align-self:flex-start">×</button>` : ""}
              </div>
            </div>
          `).join("")}
        </div>

        <div style="margin-top:14px">
          <button class="secondary" id="addExtraNodeBtn" data-unit="${unit.id}" data-node="${topic[0]}" style="width:auto;font-size:13px">+ Add Node</button>
        </div>
      `);
    }

          ${showInlineAssignmentForm ? `

              <button type="button" id="cancelInlineAssignmentBtn" class="icon secondary x-btn" title="Cancel">×</button>

          ` : `<button class="secondary" data-add-assignment="${unit.id}|${topic[0]}" style="width:auto;font-size:13px">+ Add Assignment</button>`}
        </div>
      `);
    }
