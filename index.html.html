        assignments: nodeAssignmentsView,
        assignment: assignmentBloomView,
        calendar: calendarView,
        fieldtrips: fieldTripsView,
        addlessons: addLessonsView,
        addassessments: addAssessmentsView,
        children: childrenView,
        child: childView,
        parents: parentTrackersView,
        stepforward: stepForwardView,
        publishpreview: publishPreviewView,
        yearbook: yearbookView,
        yearbookyear: yearbookYearView
      };
      document.getElementById("app").innerHTML = (views[view] || dashboardView)();
      bindEvents();
      saveState();
    }

    function bindEvents() {
      // ── FIELD TRIPS ──
      let _ftAddTargetSeason = null;
      let _ftLastRemoved = null;

      // Log visit button — toggles inline form
      document.querySelectorAll("[data-ft-log]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [seasonId, tripId] = btn.dataset.ftLog.split("|");
          // Toggle: if already logging this trip, cancel it; otherwise open it
          state.ui.ftLoggingId = state.ui.ftLoggingId === tripId ? null : tripId;
          render();
        });
      });

      // Schedule button — toggle inline schedule form
      document.querySelectorAll("[data-ft-schedule]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const tripId = btn.dataset.ftSchedule;
          state.ui.ftSchedulingId = state.ui.ftSchedulingId === tripId ? null : tripId;
          render();
        });
      });

      // Save schedule
      document.querySelectorAll("[data-ft-savesched]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [seasonId, tripId] = btn.dataset.ftSavesched.split("|");
          const trip = (state.fieldTrips[seasonId]||[]).find(t=>t.id===tripId);
          if (!trip) return;
          const date = document.getElementById("ftSchedDate-"+tripId)?.value || ftTodayISO();
          state.calFieldTrips[date] ||= [];
          if (!state.calFieldTrips[date].includes(trip.name)) state.calFieldTrips[date].push(trip.name);
          state.ui.ftSchedulingId = null;
          state.ui.ftJustScheduled = tripId;
          saveState(); render();
          setTimeout(() => { state.ui.ftJustScheduled = null; saveState(); render(); }, 4000);
        });
      });

      // Cancel schedule
      document.querySelectorAll("[data-ft-cancelsched]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          state.ui.ftSchedulingId = null;
          render();
        });
      });

      // Unschedule — remove a trip from a specific calendar day (keeps visit history and logs intact)
      document.querySelectorAll("[data-ft-unschedule]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [iso, ...nameParts] = btn.dataset.ftUnschedule.split("|");
          const name = nameParts.join("|");
          if (!confirm(`Remove "${name}" from ${formatShortDate(iso)}? Visit history and logs will not be affected.`)) return;
          if (state.calFieldTrips[iso]) {
            state.calFieldTrips[iso] = state.calFieldTrips[iso].filter(n => n !== name);
            if (!state.calFieldTrips[iso].length) delete state.calFieldTrips[iso];
          }
          saveState(); render();
        });
      });

      // Open/close per-child field trip log form
      document.querySelectorAll("[data-ft-openlog]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const parts = btn.dataset.ftOpenlog.split("|"); // iso|name|childId
          const childId = parts[parts.length-1];
          const tripKey = parts.slice(0,-1).join("|");
          const uiKey = "ftLogOpen_" + tripKey;
          state.ui[uiKey] = state.ui[uiKey] === childId ? null : childId;
          render();
        });
      });

      document.querySelectorAll("[data-ft-closelog]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const parts = btn.dataset.ftCloselog.split("|");
          const tripKey = parts.slice(0,-1).join("|");
          state.ui["ftLogOpen_" + tripKey] = null;
          render();
        });
      });

      // Pancha Kosha rating chips (1–5 per dimension) — click selects, click again deselects
      document.querySelectorAll("[data-kosha-chip]").forEach(chip => {
        chip.addEventListener("click", e => {
          e.stopPropagation();
          // The chip's data attribute is "iso|tripName|childId|dimKey" — logKey itself already
          // contains "|" characters, so we split off the LAST segment as the dimension key
          // rather than naively splitting on "|" and taking the first two parts.
          const parts = chip.dataset.koshaChip.split("|");
          const dimKey = parts.pop();
          const logKey = parts.join("|");
          const safeKey = logKey.replace(/[^a-z0-9]/gi,'_');
          const hidden = document.getElementById(`ftlog-${dimKey}-${safeKey}`);
          if (!hidden) return;
          const value = chip.dataset.koshaValue;
          const newValue = hidden.value === value ? "" : value;
          hidden.value = newValue;
          // Update chip styling in place, without a full re-render, so the form stays open.
          chip.closest(".kosha-scale-row").querySelectorAll(".kosha-chip").forEach(c => {
            c.classList.toggle("sel", c.dataset.koshaValue === newValue);
          });
        });
      });

      // ── FIELD TRIP MEDIA UPLOAD — wire file inputs ──
      // Each file input is identified by data-ft-mediafile="safeKey".
      // Selections are stored in a page-level temp map (_ftMediaPending) keyed by safeKey.
      // On Save, the pending list is merged with any already-saved media for that log.
      window._ftMediaPending = window._ftMediaPending || {};

      document.querySelectorAll("[data-ft-mediafile]").forEach(input => {
        input.addEventListener("change", async e => {
          const safeKey = input.dataset.ftMediafile;
          const files = Array.from(input.files || []);
          if (!files.length) return;
          window._ftMediaPending[safeKey] = window._ftMediaPending[safeKey] || [];
          for (const file of files) {
            if (file.type.startsWith("image/")) {
              const data = await fileToDataUrl(file);
              window._ftMediaPending[safeKey].push({ type: "image", data, name: file.name });
            } else if (file.type.startsWith("video/")) {
              const url = URL.createObjectURL(file);
              window._ftMediaPending[safeKey].push({ type: "video", url, name: file.name });
            }
          }
          input.value = "";
          // Render preview tiles without full re-render
          const previewEl = document.getElementById("ftlog-media-preview-" + safeKey);
          if (previewEl) {
            const allMedia = window._ftMediaPending[safeKey];
            previewEl.innerHTML = allMedia.map((m, mi) =>
              m.type === "image"
                ? `<div style="position:relative;display:inline-block"><img src="${m.data}" alt="upload" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--line)"><button type="button" data-ft-rmtmp="${safeKey}|${mi}" title="Remove" style="position:absolute;top:-6px;right:-6px;width:18px;min-height:18px;padding:0;font-size:10px;border-radius:50%;background:#a44155;color:white;line-height:1">×</button></div>`
                : `<div style="position:relative;display:inline-flex;align-items:center;gap:4px;background:#e8f2fb;border:1px solid #9ec5e7;border-radius:6px;padding:4px 8px;font-size:11px;max-width:160px;overflow:hidden"><span>🎬</span><span style="text-overflow:ellipsis;overflow:hidden;white-space:nowrap;max-width:100px">${m.name||"Video"}</span><button type="button" data-ft-rmtmp="${safeKey}|${mi}" title="Remove" style="flex-shrink:0;width:16px;min-height:16px;padding:0;font-size:10px;border-radius:50%;background:#a44155;color:white;line-height:1;margin-left:4px">×</button></div>`
            ).join("");
            // Wire remove buttons inside preview
            previewEl.querySelectorAll("[data-ft-rmtmp]").forEach(btn2 => {
              btn2.addEventListener("click", ev => {
                ev.stopPropagation();
                const [sk, idx] = btn2.dataset.ftRmtmp.split("|");
                if (window._ftMediaPending[sk]) {
                  window._ftMediaPending[sk].splice(Number(idx), 1);
                  btn2.closest("[data-ft-rmtmp]")?.remove();
                  // Re-render preview
                  const p2 = document.getElementById("ftlog-media-preview-" + sk);
                  if (p2) p2.querySelectorAll("[data-ft-rmtmp]").forEach((b,i) => { b.dataset.ftRmtmp = sk+"|"+i; });
                }
              });
            });
          }
        });
      });

      // Remove already-saved media item from an existing log (before re-save)
      document.querySelectorAll("[data-ft-rmmedia]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const parts = btn.dataset.ftRmmedia.split("|");
          const idx = Number(parts.pop());
          const logKey = parts.join("|");
          if (state.ftLogs[logKey]?.media) {
            state.ftLogs[logKey].media.splice(idx, 1);
            saveState(); render();
          }
        });
      });

      // Save per-child field trip log — captures all 5 Pancha Kosha ratings plus notes + media.
      // Reads whatever rating chips and notes are present, so new fields added later to this
      // form (the same pattern this app already uses for lesson evidence) keep working.
      document.querySelectorAll("[data-ft-savefull]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const logKey = btn.dataset.ftSavefull;
          const safeKey = logKey.replace(/[^a-z0-9]/gi,'_');
          const notes = document.getElementById("ftlog-notes-"+safeKey)?.value?.trim() || "";
          const ratings = {};
          FT_KOSHA_DIMENSIONS.forEach(dim => {
            const val = document.getElementById(`ftlog-${dim.key}-${safeKey}`)?.value;
            if (val) ratings[dim.key] = Number(val);
          });
          // Merge already-saved media with any newly uploaded items
          const existingMedia = state.ftLogs[logKey]?.media || [];
          const pendingMedia = window._ftMediaPending[safeKey] || [];
          const mergedMedia = [...existingMedia, ...pendingMedia];
          delete window._ftMediaPending[safeKey];
          state.ftLogs[logKey] = { ...ratings, notes, media: mergedMedia, date: ftTodayISO() };
          const parts = logKey.split("|");
          const tripKey = parts.slice(0,-1).join("|");
          state.ui["ftLogOpen_" + tripKey] = null;
          saveState(); render();
        });
      });

      // ── VISIT PHOTOS (Field Trips page → visit history) ──
      document.querySelectorAll("[data-ft-visitphoto]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [seasonId, tripId, vi] = btn.dataset.ftVisitphoto.split("|");
          const visitKey = tripId + "|" + vi;
          // Toggle the upload panel and ensure the card stays open
          state.ui["ftVisitUploadOpen_" + visitKey] = !state.ui["ftVisitUploadOpen_" + visitKey];
          state.ui.ftOpenCards = state.ui.ftOpenCards || {};
          state.ui.ftOpenCards[tripId] = true; // keep card expanded
          render();
        });
      });

      document.querySelectorAll("[data-ft-visitphoto-close]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const visitKey = btn.dataset.ftVisitphotoClose;
          const tripId = visitKey.split("|")[0];
          state.ui["ftVisitUploadOpen_" + visitKey] = false;
          state.ui.ftOpenCards = state.ui.ftOpenCards || {};
          state.ui.ftOpenCards[tripId] = true; // keep card expanded
          render();
        });
      });

      document.querySelectorAll("[data-ft-visitfile]").forEach(input => {
        input.addEventListener("change", async e => {
          const visitKey = input.dataset.ftVisitfile;
          const tripId = visitKey.split("|")[0];
          const files = Array.from(input.files || []);
          if (!files.length) return;
          state.ftVisitMedia = state.ftVisitMedia || {};
          state.ftVisitMedia[visitKey] = state.ftVisitMedia[visitKey] || [];
          for (const file of files) {
            if (file.type.startsWith("image/")) {
              const data = await fileToDataUrl(file);
              state.ftVisitMedia[visitKey].push({ type: "image", data, name: file.name });
            }
          }
          input.value = "";
          state.ui.ftOpenCards = state.ui.ftOpenCards || {};
          state.ui.ftOpenCards[tripId] = true; // keep card expanded after upload
          saveState(); render();
        });
      });

      document.querySelectorAll("[data-ft-rmvisitmedia]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const parts = btn.dataset.ftRmvisitmedia.split("|");
          const mi = Number(parts.pop());
          const visitKey = parts.join("|");
          const tripId = visitKey.split("|")[0];
          if (state.ftVisitMedia?.[visitKey]) {
            state.ftVisitMedia[visitKey].splice(mi, 1);
            state.ui.ftOpenCards = state.ui.ftOpenCards || {};
            state.ui.ftOpenCards[tripId] = true;
            saveState(); render();
          }
        });
      });

      // Mark a child as absent from a specific field trip (didn't attend)
      document.querySelectorAll("[data-ft-absent]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const absentKey = btn.dataset.ftAbsent;
          state.ftAbsent = state.ftAbsent || {};
          state.ftAbsent[absentKey] = true;
          saveState(); render();
        });
      });

      // Restore a child who was marked absent
      document.querySelectorAll("[data-ft-unabsent]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const absentKey = btn.dataset.ftUnabsent;
          if (state.ftAbsent) delete state.ftAbsent[absentKey];
          saveState(); render();
        });
      });

      // Delete a single field trip log (one child, one trip visit)
      document.querySelectorAll("[data-ft-delete-log]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const logKey = btn.dataset.ftDeleteLog;
          if (!confirm("Delete this field trip log? This cannot be undone.")) return;
          delete state.ftLogs[logKey];
          const parts = logKey.split("|");
          const tripKey = parts.slice(0,-1).join("|");
          state.ui["ftLogOpen_" + tripKey] = null;
          saveState(); render();
        });
      });

      // Delete every field trip log for trips happening this week, across all children
      document.querySelectorAll("[data-ft-delete-all-week]").forEach(btn => {
        btn.addEventListener("click", () => {
          const _now = new Date();
          const weekStart = new Date(_now); weekStart.setDate(_now.getDate() - _now.getDay());
          const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
          const ftThisWeek = [];
          for (let d = new Date(weekStart); d <= weekEnd; d.setDate(d.getDate()+1)) {
            const iso = d.toISOString().slice(0,10);
            (state.calFieldTrips[iso]||[]).forEach(name => ftThisWeek.push({ iso, name }));
          }
          const weekLogKeys = ftThisWeek.flatMap(({iso, name}) =>
            state.children.map(c => iso + "|" + name + "|" + c.id).filter(k => state.ftLogs[k])
          );
          if (!weekLogKeys.length) return;
          if (!confirm(`Delete all ${weekLogKeys.length} field trip log${weekLogKeys.length===1?"":"s"} for this week? This cannot be undone.`)) return;
          weekLogKeys.forEach(k => delete state.ftLogs[k]);
          saveState(); render();
        });
      });

      document.querySelectorAll("[data-ft-savelog]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [seasonId, tripId] = btn.dataset.ftSavelog.split("|");
          const trip = (state.fieldTrips[seasonId]||[]).find(t=>t.id===tripId);
          if (!trip) return;
          const date = document.getElementById("ftLogDate-"+tripId)?.value || ftTodayISO();
          trip.visits.push(date);
          state.ui.ftLoggingId = null;
          saveState(); render();
        });
      });

      // Cancel visit log
      document.querySelectorAll("[data-ft-cancellog]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          state.ui.ftLoggingId = null;
          render();
        });
      });

      // Remove a single visit
      document.querySelectorAll("[data-ft-rmvisit]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [seasonId, tripId, vi] = btn.dataset.ftRmvisit.split("|");
          const trip = (state.fieldTrips[seasonId]||[]).find(t=>t.id===tripId);
          if (!trip) return;
          trip.visits.splice(Number(vi), 1);
          saveState(); render();
        });
      });

      // Toggle details panel — persisted in state so re-renders keep the card open
      document.querySelectorAll("[data-ft-expand]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const tripId = btn.dataset.ftExpand;
          state.ui.ftOpenCards = state.ui.ftOpenCards || {};
          state.ui.ftOpenCards[tripId] = !state.ui.ftOpenCards[tripId];
          render();
        });
      });

      // Open card details on row click
      document.querySelectorAll(".ft-card-top").forEach(top => {
        top.addEventListener("click", e => {
          if (e.target.closest("[data-ft-log],[data-ft-rmvisit],[data-ft-remove],[data-ft-expand],[data-ft-schedule]")) return;
          const card = top.closest(".ft-trip-card");
          if (!card) return;
          const tripId = card.id.replace("ftcard-", "");
          state.ui.ftOpenCards = state.ui.ftOpenCards || {};
          state.ui.ftOpenCards[tripId] = !state.ui.ftOpenCards[tripId];
          render();
        });
      });

      // Remove a trip entirely (e.g. "Apple Orchard") — also cleans up any logged visits
      // and scheduled calendar entries tied to that trip's name, so nothing orphaned is left behind.
      document.querySelectorAll("[data-ft-remove]").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          const [seasonId, tripId] = btn.dataset.ftRemove.split("|");
          const trips = state.fieldTrips[seasonId];
          const idx = trips.findIndex(t=>t.id===tripId);
          if (idx===-1) return;
          const tripName = trips[idx].name;
          if (!confirm(`Delete "${tripName}" from your field trip list? This also removes its visit history, logged reflections, and any scheduled calendar dates. This cannot be undone.`)) return;
          _ftLastRemoved = { seasonId, trip: JSON.parse(JSON.stringify(trips[idx])), index: idx };
          trips.splice(idx, 1);
          // Remove any field trip logs (ftLogs keys are "iso|tripName|childId")
          Object.keys(state.ftLogs).forEach(k => {
            const parts = k.split("|");
            const name = parts.slice(1, -1).join("|");
            if (name === tripName) delete state.ftLogs[k];
          });
          // Remove this trip from any day it was scheduled on the calendar
          Object.keys(state.calFieldTrips).forEach(iso => {
            state.calFieldTrips[iso] = (state.calFieldTrips[iso]||[]).filter(n => n !== tripName);
            if (!state.calFieldTrips[iso].length) delete state.calFieldTrips[iso];
          });
          saveState(); render();
        });
      });

      // Open add-trip modal
      document.querySelectorAll("[data-ft-addtrip]").forEach(btn => {
        btn.addEventListener("click", () => {
          _ftAddTargetSeason = btn.dataset.ftAddtrip;
          const cfg = FT_SEASONS.find(s=>s.id===_ftAddTargetSeason);
          const badge = document.getElementById("ftSeasonBadge");
          if (badge) { badge.textContent = cfg.icon+" "+cfg.label; badge.style.background=cfg.badgeBg; badge.style.color=cfg.badgeColor; }
          ["ftName","ftCost","ftTravel","ftGrade","ftMonth","ftAddress","ftNotes"].forEach(id => { const el=document.getElementById(id); if(el) el.value=""; });
          const ot = document.getElementById("ftOneTime"); if(ot) ot.checked=false;
          const overlay = document.getElementById("ftModalOverlay");
          if (overlay) { overlay.classList.add("ft-open"); setTimeout(()=>document.getElementById("ftName")?.focus(), 60); }
        });
      });

      // Close modal
      function closeFtModal() { document.getElementById("ftModalOverlay")?.classList.remove("ft-open"); }
      document.getElementById("ftModalClose")?.addEventListener("click", closeFtModal);
      document.getElementById("ftModalCancel")?.addEventListener("click", closeFtModal);
      document.getElementById("ftModalOverlay")?.addEventListener("click", e => { if(e.target===e.currentTarget) closeFtModal(); });

      // Save new trip
      document.getElementById("ftModalSave")?.addEventListener("click", () => {
        const name = document.getElementById("ftName")?.value.trim();
        if (!name) { document.getElementById("ftName")?.focus(); return; }
        const trip = {
          id: ftUid(), name,
          cost: document.getElementById("ftCost")?.value.trim()||"",
          travel: document.getElementById("ftTravel")?.value.trim()||"",
          grade: document.getElementById("ftGrade")?.value.trim()||"",
          month: document.getElementById("ftMonth")?.value.trim()||"",
          address: document.getElementById("ftAddress")?.value.trim()||"",
          notes: document.getElementById("ftNotes")?.value.trim()||"",
          oneTime: document.getElementById("ftOneTime")?.checked||false,
          visits: [],
        };
        (state.fieldTrips[_ftAddTargetSeason] ||= []).push(trip);
        state.ui.ftOpenCards = state.ui.ftOpenCards || {};
        state.ui.ftOpenCards[trip.id] = true;
        saveState(); closeFtModal(); render();
      });

      // Enter key in name field
      document.getElementById("ftName")?.addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("ftModalSave")?.click(); });

      // ── OWNER MODE BINDINGS ──
      // Secret click on the GSA logo mark to open unlock modal
      const ownerModeToggle = document.getElementById("ownerModeToggle");
      if (ownerModeToggle && !isOwnerMode) {
        ownerModeToggle.addEventListener("click", () => {
          const modal = document.getElementById("ownerUnlockModal");
          if (modal) { modal.style.display = "flex"; setTimeout(() => document.getElementById("ownerPinInput")?.focus(), 50); }
        });
      }
      // Exit owner mode
      const exitOwnerModeBtn = document.getElementById("exitOwnerModeBtn");
      if (exitOwnerModeBtn) {
        exitOwnerModeBtn.addEventListener("click", () => {
          sessionStorage.removeItem("gsa-owner-unlocked");
          isOwnerMode = false;
          view = "dashboard";
          // Switch to customer storage key
          location.reload();
        });
      }
      // Owner PIN submit
      const ownerPinSubmit = document.getElementById("ownerPinSubmit");
      const ownerPinCancel = document.getElementById("ownerPinCancel");
      if (ownerPinSubmit) {
        const doUnlock = () => {
          const input = document.getElementById("ownerPinInput");
          const entered = input?.value || "";
          const storedPin = localStorage.getItem("gsa-owner-pin") || "gsaowner";
          if (entered === storedPin) {
            sessionStorage.setItem("gsa-owner-unlocked", "yes");
            document.getElementById("ownerUnlockModal").style.display = "none";
            location.reload();
          } else {
            const err = document.getElementById("ownerPinError");
            if (err) { err.textContent = "Incorrect PIN. Try again."; err.style.display = "block"; }
            if (input) { input.value = ""; input.focus(); }
          }
        };
        ownerPinSubmit.addEventListener("click", doUnlock);
        document.getElementById("ownerPinInput")?.addEventListener("keydown", e => { if (e.key === "Enter") doUnlock(); });
      }
      if (ownerPinCancel) {
        ownerPinCancel.addEventListener("click", () => {
          document.getElementById("ownerUnlockModal").style.display = "none";
        });
      }
      // Publish for customers
      const publishBtn = document.getElementById("publishForCustomersBtn");
      if (publishBtn) {
        publishBtn.addEventListener("click", () => {

          // ── Validate Customer PIN ──
          const customerPinRaw = document.getElementById("customerPinField")?.value?.trim().toUpperCase().replace(/\s+/g,"") || "";
          const customerPinConfirm = document.getElementById("customerPinConfirm")?.value?.trim().toUpperCase().replace(/\s+/g,"") || "";
          if (!customerPinRaw) { alert("Please set a Customer Access PIN before exporting."); document.getElementById("customerPinField")?.focus(); return; }
          if (customerPinRaw.length < 4) { alert("Customer PIN must be at least 4 characters."); return; }
          if (customerPinRaw !== customerPinConfirm) { alert("Customer PINs don't match. Please check both fields."); return; }

          // ── Validate Owner PIN (optional change) ──
          const newOwnerPin = document.getElementById("newOwnerPin")?.value?.trim();
          const confirmOwnerPin = document.getElementById("confirmOwnerPin")?.value?.trim();
          if (newOwnerPin || confirmOwnerPin) {
            if (newOwnerPin !== confirmOwnerPin) { alert("Owner PINs don't match."); return; }
            if (newOwnerPin.length < 4) { alert("Owner PIN must be at least 4 characters."); return; }
            localStorage.setItem("gsa-owner-pin", newOwnerPin);
          }
          const activeOwnerPin = localStorage.getItem("gsa-owner-pin") || "gsaowner";

          // ── Customer label for filename ──
          const customerLabel = document.getElementById("customerLabel")?.value?.trim() || "";
          const safeLabel = customerLabel ? "-" + customerLabel.replace(/[^a-zA-Z0-9]+/g, "-").replace(/^-|-$/g,"") : "";
          const filename = `GSA-Lattice${safeLabel}.html`;

          if (!confirm(`Export customer file: "${filename}"?\n\nCustomer PIN: ${customerPinRaw}\n\n✅ Includes full curriculum\n🚫 Strips all your private family data\n\nWrite down this PIN — you'll need it to share with your customer.`)) return;

  })();
  <\/script>`;

      function deleteNodeById(unitId, nodeId, fromSubjectId) {
        const unit = unitById(unitId);
        const node = nodeById(unit, nodeId);
        const isShared = !node[3];
        if (isShared && fromSubjectId) {

          saveState(); view = "subject"; render();
          return;

            doc.text(pName + " — Growth Tracker", margin, 38);
            doc.setFontSize(11); doc.setFont("helvetica", "normal"); doc.setTextColor(180,230,210);
            doc.text("GSA Lattice LMS · Parent Self-Tracking Report", margin, 58);
            doc.text("Generated: " + new Date().toLocaleDateString(), pw - margin, 58, { align: "right" });

            let y = 100;
            const checkY = (needed) => {
              if (y + needed > ph - 40) { doc.addPage(); y = 40; }
            };

            // Summary stats
            const avgStars = entries.length ? (entries.reduce((s,[,v])=>s+(v.stars||0),0)/entries.length).toFixed(1) : 0;
            const yesCount = entries.filter(([,v])=>v.metric==="Yes").length;
            const metricPct = entries.length ? Math.round((yesCount/entries.length)*100) : 0;

            checkY(80);
            doc.setFillColor(238, 247, 242); doc.roundedRect(margin, y, usable, 70, 6, 6, "F");
            doc.setFontSize(11); doc.setFont("helvetica", "bold"); doc.setTextColor(20,93,69);
            doc.text("Total Check-In Days", margin + 16, y + 22);
            doc.text("Average Stars", margin + usable/4 + 16, y + 22);
            doc.text('"Yes" Rate', margin + usable/2 + 16, y + 22);
            doc.text("Streak Days", margin + 3*usable/4 + 16, y + 22);
            doc.setFontSize(20); doc.setFont("helvetica", "bold");
            doc.setTextColor(20,93,69); doc.text(String(entries.length), margin + 16, y + 52);
            doc.setTextColor(35,111,166); doc.text(avgStars + "★", margin + usable/4 + 16, y + 52);
            doc.setTextColor(198,146,46); doc.text(metricPct + "%", margin + usable/2 + 16, y + 52);
            doc.setTextColor(20,93,69); doc.text(String(entries.length), margin + 3*usable/4 + 16, y + 52);
            y += 90;

            // Star chart (bar chart)
            checkY(120);
            doc.setFontSize(13); doc.setFont("helvetica", "bold"); doc.setTextColor(30,30,30);
            doc.text("★ Star Rating Over Time", margin, y); y += 16;
            const barW = Math.min(18, (usable / Math.max(entries.length, 1)) - 2);
            const chartH = 80;
            entries.forEach(([k,v], i) => {
              const stars = v.stars || 0;
              const bH = (stars / 5) * chartH;
              const bx = margin + i * (barW + 2);
              const col = stars >= 4 ? [20,131,95] : stars >= 3 ? [35,111,166] : [164,65,85];
              doc.setFillColor(...col);
              doc.rect(bx, y + chartH - bH, barW, bH, "F");
            });
            // Y axis labels
            doc.setFontSize(8); doc.setTextColor(120,120,120);
            [1,2,3,4,5].forEach(n => {
              const gy = y + chartH - (n/5)*chartH;
              doc.setDrawColor(200,220,210); doc.setLineWidth(.3);
              doc.line(margin, gy, margin + usable, gy);
              doc.text(String(n)+"★", margin - 12, gy + 3);
            });
            y += chartH + 20;

            // Metric bar chart
            checkY(120);
            doc.setFontSize(13); doc.setFont("helvetica", "bold"); doc.setTextColor(30,30,30);
            doc.text("Daily Metric Responses", margin, y); y += 16;
            entries.forEach(([k,v], i) => {
              const bx = margin + i * (barW + 2);
              const col = v.metric === "Yes" ? [20,131,95] : v.metric === "No trigger today" ? [198,146,46] : [164,65,85];
              doc.setFillColor(...col);
              doc.rect(bx, y, barW, 36, "F");
            });
            y += 56;

            // Legend
            doc.setFontSize(9); doc.setFont("helvetica", "normal"); doc.setTextColor(80,80,80);
            doc.setFillColor(20,131,95); doc.rect(margin, y, 10, 10, "F"); doc.text("Yes", margin + 14, y + 8);
            doc.setFillColor(164,65,85); doc.rect(margin + 40, y, 10, 10, "F"); doc.text("No", margin + 54, y + 8);
            doc.setFillColor(198,146,46); doc.rect(margin + 78, y, 10, 10, "F"); doc.text("No trigger today", margin + 92, y + 8);
            y += 26;

            // Log table
            checkY(60);
            doc.setFontSize(13); doc.setFont("helvetica", "bold"); doc.setTextColor(30,30,30);
            doc.text("Entry Log", margin, y); y += 16;
            entries.slice().reverse().forEach(([k,v]) => {
              checkY(30);
              const d = k.split("|")[1];
              const starsStr = "★".repeat(v.stars||0) + "☆".repeat(5-(v.stars||0));
              doc.setFillColor(248,251,249); doc.roundedRect(margin, y, usable, 22, 3, 3, "F");
              doc.setFontSize(9); doc.setFont("helvetica", "bold"); doc.setTextColor(30,30,30);
              doc.text(d, margin + 8, y + 14);
              const col2 = v.metric === "Yes" ? [20,93,69] : v.metric === "No trigger today" ? [166,102,23] : [164,65,85];
              doc.setTextColor(...col2);
              doc.text(v.metric || "—", margin + 90, y + 14);
              doc.setTextColor(245,197,24);
              doc.text(starsStr, margin + 220, y + 14);
              y += 26;
            });

            // Footer
            doc.setFontSize(9); doc.setTextColor(150,150,150);
            doc.text("GSA Lattice LMS · " + pName + " Growth Tracker", margin, ph - 20);

            doc.save(`${pName.replace(/\s+/g,"-")}-Tracker.pdf`);
          } catch(err) { alert("PDF error: " + err.message); }
        });
      });

      // ── CALENDAR DAY CLICK ──
      // selectedCalDate is declared at module scope so the panel survives render() calls
      function renderFieldTripChips(dateStr) {
        const chipsEl = document.getElementById("fieldTripChips");
        if (!chipsEl) return;
        const trips = state.calFieldTrips?.[dateStr] || [];
        if (!trips.length) {
          chipsEl.innerHTML = `<span style="font-size:12px;color:var(--muted)">No field trip options set for this day yet.</span>`;
          return;
        }
        chipsEl.innerHTML = trips.map((t, i) => `
          <span style="display:inline-flex;align-items:center;gap:6px;background:#fff3d7;border:1px solid #e6c878;border-radius:14px;padding:5px 6px 5px 10px;font-size:12px;font-weight:600;color:#7a5a14">
            🚌 ${esc(t)}
            <button type="button" data-remove-trip-index="${i}" title="Remove this option" style="width:18px;height:18px;min-height:0;padding:0;border-radius:50%;background:#a44155;color:#fff;font-size:10px;line-height:1;display:inline-grid;place-items:center">✕</button>
          </span>
        `).join("");
        chipsEl.querySelectorAll("[data-remove-trip-index]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = Number(btn.dataset.removeTripIndex);
            const arr = state.calFieldTrips[dateStr] || [];
            arr.splice(idx, 1);
            if (!arr.length) delete state.calFieldTrips[dateStr];
            saveState(); render();
          });
        });
      }

      function renderCalNoteChips(dateStr) {
        const chipsEl = document.getElementById("calNoteChips");
        if (!chipsEl) return;
        const notes = state.calNotes?.[dateStr] || [];
        if (!notes.length) {
          chipsEl.innerHTML = `<span style="font-size:12px;color:var(--muted)">No notes for this day yet.</span>`;
          return;
        }
        chipsEl.innerHTML = notes.map((n, i) => {
          const textContent = n.url
            ? `<a href="${esc(n.url)}" target="_blank" rel="noreferrer">${esc(n.text)}</a>`
            : esc(n.text);
          return `
            <span class="cal-note-chip">
              ${textContent}
              <button type="button" data-remove-note-index="${i}" title="Delete note"
                style="width:18px;height:18px;min-height:0;padding:0;border-radius:50%;background:#60746e;color:#fff;font-size:10px;line-height:1;display:inline-grid;place-items:center;flex-shrink:0">✕</button>
            </span>
          `;
        }).join("");
        chipsEl.querySelectorAll("[data-remove-note-index]").forEach(btn => {
          btn.addEventListener("click", () => {
            const idx = Number(btn.dataset.removeNoteIndex);
            const arr = state.calNotes[dateStr] || [];
            arr.splice(idx, 1);
            if (!arr.length) delete state.calNotes[dateStr];
            saveState(); render();
          });
        });
      }

      function openCalDayPanel(dateStr) {
        const actionsEl = document.getElementById("calDayActions");
        const labelEl = document.getElementById("calSelectedDateLabel");
        if (actionsEl) actionsEl.style.display = "block";
        if (labelEl) labelEl.textContent = dateStr;
        renderFieldTripChips(dateStr);
        renderCalNoteChips(dateStr);
      }
      document.querySelectorAll("[data-cal-date]").forEach(cell => {
        cell.addEventListener("click", () => {
          selectedCalDate = cell.dataset.calDate;
          openCalDayPanel(selectedCalDate);
        });
      });
      // Re-open the panel after a re-render if a day was already selected
      if (selectedCalDate && document.getElementById("calDayActions")) {
        openCalDayPanel(selectedCalDate);
      }
      const markDayOffBtn = document.getElementById("markDayOffBtn");
      if (markDayOffBtn) {
        markDayOffBtn.addEventListener("click", () => {
          if (!selectedCalDate) return;
          state.calDaysOff ||= [];
          if (!state.calDaysOff.includes(selectedCalDate)) state.calDaysOff.push(selectedCalDate);
          saveState(); render();
        });
      }
      const unmarkDayOffBtn = document.getElementById("unmarkDayOffBtn");
      if (unmarkDayOffBtn) {
        unmarkDayOffBtn.addEventListener("click", () => {
          if (!selectedCalDate) return;
          state.calDaysOff = (state.calDaysOff||[]).filter(d => d !== selectedCalDate);
          saveState(); render();
        });
      }
      const addFieldTripBtn = document.getElementById("addFieldTripBtn");
      if (addFieldTripBtn) {
        addFieldTripBtn.addEventListener("click", () => {
          if (!selectedCalDate) return;
          const inputEl = document.getElementById("fieldTripInput");
          const label = inputEl?.value?.trim();
          if (!label) return;
          state.calFieldTrips ||= {};
          state.calFieldTrips[selectedCalDate] ||= [];
          if (!state.calFieldTrips[selectedCalDate].includes(label)) {
            state.calFieldTrips[selectedCalDate].push(label);
          }
          // Also remove from days off if it was marked off
          state.calDaysOff = (state.calDaysOff||[]).filter(d => d !== selectedCalDate);
          saveState(); render();
        });
      }

      // ── CALENDAR NOTES ──
      const addCalNoteBtn = document.getElementById("addCalNoteBtn");
      if (addCalNoteBtn) {
        addCalNoteBtn.addEventListener("click", () => {
          if (!selectedCalDate) return;
          const textEl = document.getElementById("calNoteTextInput");
          const urlEl  = document.getElementById("calNoteUrlInput");
          const text = textEl?.value?.trim();
          if (!text) { textEl?.focus(); return; }
          const url = urlEl?.value?.trim() || "";
          state.calNotes ||= {};
          state.calNotes[selectedCalDate] ||= [];
          state.calNotes[selectedCalDate].push({ id: crypto.randomUUID(), text, url });
          if (textEl) textEl.value = "";
          if (urlEl)  urlEl.value  = "";
          saveState(); render();
        });
      }
      // Allow Enter key in the note text field to submit
      const calNoteTextInput = document.getElementById("calNoteTextInput");
      if (calNoteTextInput) {
        calNoteTextInput.addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); document.getElementById("addCalNoteBtn")?.click(); }
        });
      }

      // Portfolio import per child
      document.querySelectorAll("[data-portfolio-import]").forEach(inp => {
        inp.addEventListener("change", () => {
          if (!inp.files[0]) return;
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const imported = JSON.parse(reader.result);
              if (!imported.child||!imported.evidence) throw new Error("Invalid portfolio file.");
              // Merge evidence
              const newEvidence = imported.evidence.filter(e => !state.evidence.find(x=>x.id===e.id));
              state.evidence.push(...newEvidence);
              Object.assign(state.completions, imported.completions||{});
              saveState(); render();
            } catch(err) { alert("Could not import: "+err.message); }
          };
          reader.readAsText(inp.files[0]);
        });
      });

      // ── GOOGLE AUTH BUTTON BINDINGS ──
      // Sign-in: prompt the GIS One Tap / popup flow.
      const googleSignInBtn = document.getElementById("googleSignInBtn");
      if (googleSignInBtn) {
        googleSignInBtn.addEventListener("click", () => {
          if (!googleAuth.ready) {
            console.warn("[GSA LMS] Google auth not ready yet.");
            return;
          }
          google.accounts.id.prompt(notification => {
            // If One Tap was suppressed (e.g. user previously dismissed it),
            // fall back to the standard popup sign-in flow.
            if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
              google.accounts.id.renderButton(
                document.createElement("div"), // off-screen — we only want the flow
                { theme: "outline", size: "large" }
              );
              // Trigger the popup directly via an invisible button click
              const tmp = document.createElement("div");
              tmp.style.display = "none";
              document.body.appendChild(tmp);
              google.accounts.id.renderButton(tmp, { theme: "outline", size: "large" });
              tmp.querySelector("div[role=button]")?.click();
              setTimeout(() => tmp.remove(), 5000);
            }
          });
        });
      }

      // Sign-out: clear memory state and re-render.
      const googleSignOutBtn = document.getElementById("googleSignOutBtn");
      if (googleSignOutBtn) {
        googleSignOutBtn.addEventListener("click", signOutGoogle);
      }
    }

    function updateAssignDropdown(sel, unitId, nodeId) {
      if (!sel || !unitId || !nodeId) return;
      const count = assignmentCountForNode(unitId, nodeId);
      sel.innerHTML = Array.from({length: Math.max(count, 3)}, (_,i) => `<option value="${i+1}">Assignment ${i+1}</option>`).join("");
    }

    // ── YEARBOOK EXPORT: standalone self-contained HTML keepsake ──
    // Builds one offline-ready .html file with every photo embedded inline (data URLs already
    // stored in evidence), grouped by month and child, styled as a scrapbook page. Opens in any
    // browser forever, with no dependency on this app or localStorage.
    function exportYearbookHtml(startYear) {
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const evs = [...state.evidence, ...ftMediaAsEvidence()].filter(e => schoolYearStartYear(e.date) === startYear);
      const groups = {};
      for (const ev of evs) {
        const d = new Date(ev.date);
        const mk = d.getFullYear() + "-" + String(d.getMonth()).padStart(2,"0");
        groups[mk] ||= { label: monthNames[d.getMonth()] + " " + d.getFullYear(), byChild: {} };
        const cid = ev.childId || "_none";
        groups[mk].byChild[cid] ||= [];
        groups[mk].byChild[cid].push(ev);
      }
      const monthOrder = [];
      for (let m = 7; m <= 11; m++) monthOrder.push(startYear + "-" + String(m).padStart(2,"0"));
      for (let m = 0; m <= 6; m++) monthOrder.push((startYear+1) + "-" + String(m).padStart(2,"0"));
      const sortedKeys = monthOrder.filter(k => groups[k]);

      function cardHtml(ev) {
        const unit = unitById(ev.unitId);
        const node = unit ? nodeById(unit, ev.nodeId) : null;
        const subLabel = ev.subjectId ? (SUBJECTS.find(s=>s.id===ev.subjectId)?.label || "") : "";
        const dateStr = new Date(ev.date).toLocaleDateString(undefined, { month:"short", day:"numeric" });
        const caption = ev._isFtMedia
          ? ("🚌 " + (ev._tripName || "Field Trip"))
          : [node?.[1], subLabel].filter(Boolean).join(" · ");
        const ytThumb = ev.video ? youtubeThumbUrl(ev.video) : "";
        let mediaHtml = `<div class="ph">📝</div>`;
        if (ev.image) mediaHtml = `<img src="${ev.image}" alt="">`;
        else if (ev.video && ytThumb) mediaHtml = `<a href="${esc(ev.video)}" target="_blank" rel="noreferrer" style="position:relative;display:block"><img src="${ytThumb}" alt=""><span class="play">▶</span></a>`;
        else if (ev.video) mediaHtml = `<a href="${esc(ev.video)}" target="_blank" rel="noreferrer" class="ph" style="display:grid">🎬</a>`;
        return `
          <figure class="card">
            <div class="media">${mediaHtml}</div>
            <figcaption><span class="date">${esc(dateStr)}</span>${caption ? esc(caption) : (ev.notes ? esc(ev.notes.slice(0,70)) : "Logged moment")}</figcaption>
          </figure>
        `;
      }

      const childNamesPresent = Array.from(new Set(evs.map(e => e.childId).filter(Boolean))).map(childName);
      const bodyHtml = sortedKeys.length === 0
        ? `<p class="empty">No moments logged for this school year.</p>`
        : sortedKeys.map(mk => {
            const { label, byChild } = groups[mk];
            const childKeys = Object.keys(byChild).sort((a,b) => (a==="_none"?1:b==="_none"?-1:childName(a).localeCompare(childName(b))));
            return `
              <section class="month">
                <h2>${esc(label)}</h2>
                ${childKeys.map(cid => `
                  ${childKeys.length > 1 ? `<h3 class="childhead">${esc(cid==="_none"?"Unassigned":childName(cid))}</h3>` : ""}
                  <div class="collage">${byChild[cid].map(cardHtml).join("")}</div>
                `).join("")}
              </section>
            `;
          }).join("");

      const docHtml = `<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Golden Soul Academy Yearbook · ${schoolYearLabel(startYear)}</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; background: #fbf6ec; color: #20211f; margin: 0; }
  .cover { background: linear-gradient(150deg,#123d33,#156d61 55%,#236fa6); color: #fff; padding: 70px 40px; text-align: center; }
  .cover h1 { font-size: 40px; margin: 0 0 8px; letter-spacing: .02em; }
  .cover p { font-size: 16px; opacity: .85; margin: 0; }
  main { max-width: 980px; margin: 0 auto; padding: 30px 24px 60px; }
  .month { background: linear-gradient(160deg,#fffdf6,#fff7e4); border: 1px solid #edd19a; border-radius: 14px; padding: 26px 28px; margin: 26px 0; box-shadow: 0 10px 26px rgba(27,52,46,.10); }
  .month h2 { margin: 0 0 14px; color: #145d45; font-size: 22px; border-bottom: 2px solid #c6922e; padding-bottom: 8px; }
  .childhead { display: inline-block; margin: 16px 0 10px; font-size: 13px; font-weight: 700; color: #145d45; background: #eef7f2; border: 1px solid #cfe6da; border-radius: 999px; padding: 5px 14px; }
  .collage { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr)); gap: 16px; margin-bottom: 6px; }
  .card { margin: 0; background: #fff; border: 1px solid #f0e6c8; border-radius: 4px; padding: 10px 10px 12px; box-shadow: 0 6px 14px rgba(27,52,46,.15); }
  .media { width: 100%; aspect-ratio: 1/1; border-radius: 2px; overflow: hidden; background: #eef3ef; display: grid; place-items: center; position: relative; }
  .media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ph { font-size: 30px; color: #8a9b95; text-decoration: none; }
  .play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.9); display: grid; place-items: center; color: #145d45; }
  figcaption { font-size: 11.5px; color: #2c3a36; line-height: 1.35; margin-top: 7px; }
  figcaption .date { display: block; font-size: 10px; color: #6a7d77; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
  .empty { text-align: center; color: #6a7d77; padding: 60px 20px; font-style: italic; }
  footer { text-align: center; color: #8a9b95; font-size: 11px; padding: 20px; }
</style></head>
<body>
  <div class="cover">
    <h1>📔 Golden Soul Academy Yearbook</h1>
    <p>${esc(schoolYearLabel(startYear))} &middot; ${esc(childNamesPresent.join(", ") || "All Children")}</p>
  </div>
  <main>${bodyHtml}</main>
  <footer>Exported from the GSA Lattice LMS &middot; ${esc(new Date().toLocaleDateString())}</footer>
</body></html>`;

      const blob = new Blob([docHtml], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `GSA-Yearbook-${startYear}-${parseInt(startYear)+1}.html`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    // ── YEARBOOK EXPORT: printable PDF ──
    // Lays out the same school-year collage as a multi-page PDF using jsPDF, embedding each
    // photo directly on the page (auto-detecting JPEG vs PNG from the data URL prefix).
    async function exportYearbookPdf(startYear) {
      const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const evs = [...state.evidence, ...ftMediaAsEvidence()].filter(e => schoolYearStartYear(e.date) === startYear);
      if (!evs.length) { alert("No moments logged yet for " + schoolYearLabel(startYear) + "."); return; }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "letter" });
      const pw = doc.internal.pageSize.getWidth();
      const ph = doc.internal.pageSize.getHeight();
      const margin = 40;
      const usable = pw - margin * 2;

      // Cover page
      doc.setFillColor(18, 61, 51);
      doc.rect(0, 0, pw, ph, "F");
      doc.setTextColor(255,255,255);
      doc.setFont("helvetica","bold");
      doc.setFontSize(30);
      doc.text("Golden Soul Academy", pw/2, ph/2 - 50, { align: "center" });
      doc.setFontSize(22);
      doc.text("Yearbook", pw/2, ph/2 - 14, { align: "center" });
      doc.setFont("helvetica","normal");
      doc.setFontSize(14);
      doc.text(schoolYearLabel(startYear), pw/2, ph/2 + 20, { align: "center" });

      const groups = {};
      for (const ev of evs) {
        const d = new Date(ev.date);
        const mk = d.getFullYear() + "-" + String(d.getMonth()).padStart(2,"0");
        groups[mk] ||= { label: monthNames[d.getMonth()] + " " + d.getFullYear(), items: [] };
        groups[mk].items.push(ev);
      }
      const monthOrder = [];
      for (let m = 7; m <= 11; m++) monthOrder.push(startYear + "-" + String(m).padStart(2,"0"));
      for (let m = 0; m <= 6; m++) monthOrder.push((startYear+1) + "-" + String(m).padStart(2,"0"));
      const sortedKeys = monthOrder.filter(k => groups[k]);

      const cols = 3;
      const gap = 14;
      const cellW = (usable - gap * (cols - 1)) / cols;
      const imgH = cellW; // square thumbnails
      const capH = 30;
      const cellH = imgH + capH;

      function imgFormat(dataUrl) {
        if (dataUrl.startsWith("data:image/png")) return "PNG";
        if (dataUrl.startsWith("data:image/webp")) return "WEBP";
        return "JPEG";
      }

      for (const mk of sortedKeys) {
        const { label, items } = groups[mk];
        doc.addPage();
        let y = margin;
        doc.setFillColor(18, 61, 51);
        doc.rect(margin, y, usable, 30, "F");
        doc.setTextColor(255,255,255);
        doc.setFont("helvetica","bold");
        doc.setFontSize(14);
        doc.text(label, margin + 12, y + 20);
        doc.setTextColor(30,30,30);
        y += 44;

        let col = 0;
        for (const ev of items) {
          if (y + cellH > ph - margin) {
            doc.addPage();
            y = margin;
          }
          const x = margin + col * (cellW + gap);
          // Frame
          doc.setFillColor(255,255,255);
          doc.setDrawColor(240,230,200);
          doc.roundedRect(x, y, cellW, cellH, 3, 3, "FD");

          if (ev.image) {
            try {
              const fmt = imgFormat(ev.image);
              doc.addImage(ev.image, fmt, x + 5, y + 5, cellW - 10, imgH - 10, undefined, "FAST");
            } catch (err) {
              doc.setFontSize(22);
              doc.text("📷", x + cellW/2, y + imgH/2, { align: "center" });
            }
          } else if (ev.video) {
            doc.setFillColor(232,243,251);
            doc.rect(x + 5, y + 5, cellW - 10, imgH - 10, "F");
            doc.setFontSize(22);
            doc.text("🎬", x + cellW/2, y + imgH/2 + 8, { align: "center" });
          } else {
            doc.setFillColor(248,251,249);
            doc.rect(x + 5, y + 5, cellW - 10, imgH - 10, "F");
            doc.setFontSize(22);
            doc.text("📝", x + cellW/2, y + imgH/2 + 8, { align: "center" });
          }

          const unit = unitById(ev.unitId);
          const node = unit ? nodeById(unit, ev.nodeId) : null;
          const dateStr = new Date(ev.date).toLocaleDateString(undefined, { month:"short", day:"numeric" });
          const capText = ev._isFtMedia
            ? [dateStr, "🚌 " + (ev._tripName || "Field Trip")].join(" · ")
            : ([dateStr, node?.[1]].filter(Boolean).join(" · ") || (ev.notes ? ev.notes.slice(0,40) : "Logged moment"));
          doc.setFontSize(8.5);
          doc.setFont("helvetica","normal");
          doc.setTextColor(60,75,70);
          const wrapped = doc.splitTextToSize(capText, cellW - 10);
          doc.text(wrapped.slice(0,2), x + cellW/2, y + imgH + 12, { align: "center" });
          doc.setTextColor(30,30,30);

          col++;
          if (col >= cols) { col = 0; y += cellH + gap; }
        }
      }

      doc.save(`GSA-Yearbook-${startYear}-${parseInt(startYear)+1}.pdf`);
    }

      if (window.$memberstackDom?.getCurrentMember) return Promise.resolve(window.$memberstackDom);
      if (attempts >= 80) return Promise.reject(new Error("Memberstack did not load."));
      return new Promise(resolve => setTimeout(resolve, 100)).then(() => waitForMemberstackDom(attempts + 1));

      z-index: 10000;
      background: linear-gradient(135deg, #123d33, #1b4f72);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    #ms-auth-bar .ms-bar-left  { display: flex; align-items: center; gap: 10px; }
    #ms-auth-bar .ms-bar-right { display: flex; align-items: center; gap: 8px; }
    #ms-auth-bar .ms-badge {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    #ms-auth-bar .ms-badge.pro   { background: rgba(198,146,46,.35);  border-color: rgba(198,146,46,.6); }
    #ms-auth-bar .ms-badge.basic { background: rgba(35,111,166,.35);  border-color: rgba(35,111,166,.6); }
    #ms-auth-bar .ms-badge.free  { background: rgba(255,255,255,.1);  border-color: rgba(255,255,255,.2); }
    .ms-btn {
      border: 0;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      min-height: 0;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .ms-btn:hover { opacity: .85; }
    .ms-btn-primary  { background: linear-gradient(135deg, #20835f, #236fa6); color: white; }
    .ms-btn-outline  { background: transparent; color: white; border: 1px solid rgba(255,255,255,.45); }
    .ms-btn-danger   { background: rgba(164,65,85,.8); color: white; }

    /* ── Gated content banners ── */
    .ms-gated-banner {
      border: 2px dashed #d2ddd9;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      background: rgba(255,255,255,.7);
      color: #60746e;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .ms-gated-banner h3 { margin: 0 0 8px; font-size: 17px; color: #172522; }
    .ms-gated-banner p  { margin: 0 0 14px; font-size: 13px; line-height: 1.5; }

    /* Offset the app shell so the auth bar doesn't overlap it */
    body.ms-bar-visible { padding-top: 44px; }
  </style>

  <script type="module">
    // ── CONFIG ────────────────────────────────────────────────────
    // Plan IDs are defined ONCE at the top of the main <script> block in
    // MEMBERSTACK_PLAN_IDS and exposed via window.GSA_MEMBERSTACK_PLAN_IDS.
    // Edit them there only — never add a duplicate set here.
    const PLAN_IDS = window.GSA_MEMBERSTACK_PLAN_IDS;

    const PRICE_IDS = window.GSA_MEMBERSTACK_PRICE_IDS;

    const PLANS = [
      { key: "customMonthly",  mode: "unfilled",  icon: "✍️", name: "Create Your Own Curriculum Monthly Access",      price: "$20",   planId: PLAN_IDS?.CREATE_YOUR_OWN_MONTHLY,  priceId: PRICE_IDS?.CREATE_YOUR_OWN_MONTHLY  },
      { key: "customLifetime", mode: "unfilled",  icon: "🧭", name: "Create Your Own Curriculum Lifetime Access",     price: "$2200", planId: PLAN_IDS?.CREATE_YOUR_OWN_LIFETIME, priceId: PRICE_IDS?.CREATE_YOUR_OWN_LIFETIME },
      { key: "familyMonthly",  mode: "prefilled", icon: "📚", name: "Already Created Curriculum Monthly Access",      price: "$60",   planId: PLAN_IDS?.ALREADY_CREATED_MONTHLY,  priceId: PRICE_IDS?.ALREADY_CREATED_MONTHLY  },
      { key: "familyLifetime", mode: "prefilled", icon: "🏛️", name: "Already Created Curriculum Lifetime Access",     price: "$3000", planId: PLAN_IDS?.ALREADY_CREATED_LIFETIME, priceId: PRICE_IDS?.ALREADY_CREATED_LIFETIME },
    ];

    // ── INIT ──────────────────────────────────────────────────────
    const memberstack = window.$memberstackDom;
    window.memberstack = memberstack;

    // ── STATE ─────────────────────────────────────────────────────
    let currentMember = null;
    let currentPlanTag = null;   // "customMonthly" | "customLifetime" | "familyMonthly" | "familyLifetime" | null
    let selectedPlanKey = "customMonthly";

    // ── DOM REFS (auth bar only — no custom modal markup anymore) ──
    const authBar      = document.getElementById("ms-auth-bar");
    const memberName   = document.getElementById("ms-member-name");
    const memberBadge  = document.getElementById("ms-member-badge");
    const logoutBtn    = document.getElementById("ms-logout-btn");
    const loginBtn     = document.getElementById("ms-login-btn");     // has data-ms-modal="login"
    const signupBtn    = document.getElementById("ms-signup-btn");    // has data-ms-modal="signup"

    function isEditablePlaceholder(planId) {
      // Real Memberstack plan IDs always begin with "pln_" — never block them.
      if (!planId) return true;
      if (planId.startsWith("pln_")) return false;
      return /PASTE_|_HERE$|^YOUR_/i.test(planId);
    }

    async function getFreshMember() {
      try {
        const response = await memberstack.getCurrentMember();
        return response?.data?.member || response?.data || null;
      } catch {
        return null;
      }
    }

    // ── CORE ROUTING: this is the single function that takes a member from
    // "just authenticated via Memberstack's pre-built modal" all the way to
    // a rendered dashboard. It is the only place that calls into the app's
    // existing authorization sequence:
    //   enterAppAfterAuth() -> __gsaEnterMemberWorkspace() -> startAuthorizedApp(mode) -> render()
    async function enterAppAfterAuth(member, fallbackMode = null) {
      // Re-fetch to pick up fresh planConnections that a just-completed
      // Memberstack modal flow may not have attached to the member object yet.
      const freshMember = await getFreshMember();
      const activeMember = freshMember || member || null;
      updateAuthBar(activeMember);

      if (!activeMember) return;

      let mode = (typeof window.__gsaCurriculumModeForMember === "function")
        ? window.__gsaCurriculumModeForMember(activeMember) || window.__gsaCurriculumModeForMember(member)
        : null;

      if (!mode) mode = fallbackMode; // still null in normal use — no more guessing a plan

      if (typeof window.__gsaEnterMemberWorkspace === "function") {
        // __gsaEnterMemberWorkspace() internally calls startAuthorizedApp(mode) when
        // a plan exists, or shows the 4-option access page when mode is null.
        window.__gsaEnterMemberWorkspace(activeMember, mode);
      }
    }
    window.__gsaEnterAppAfterAuth = enterAppAfterAuth;

    // ── AUTH BAR ──────────────────────────────────────────────────
    function getPlanTag(member) {
      if (!member) return null;
      const planConnections = member.planConnections || [];
      for (const plan of PLANS) {
        if (planConnections.some(pc => pc.planId === plan.planId)) return plan.key;
      }
      return member.customAttributes?.["plan-tag"] || null;
    }

    function updateAuthBar(member) {
      currentMember  = member;
      currentPlanTag = getPlanTag(member);

      if (member) {
        memberName.textContent    = member.auth?.email || "Member";
        memberBadge.textContent   = currentPlanTag ? currentPlanTag.charAt(0).toUpperCase() + currentPlanTag.slice(1) : "Member";
        memberBadge.className     = `ms-badge ${currentPlanTag || "free"}`;
        memberName.style.display  = "inline";
        memberBadge.style.display = "inline";
        logoutBtn.style.display   = "inline-flex";
        loginBtn.style.display    = "none";
        signupBtn.style.display   = "none";
      } else {
        memberName.style.display  = "none";
        memberBadge.style.display = "none";
        logoutBtn.style.display   = "none";
        loginBtn.style.display    = "inline-flex";
        signupBtn.style.display   = "inline-flex";
      }
    }

    // ── LOGOUT ────────────────────────────────────────────────────
    logoutBtn.addEventListener("click", async () => {
      await memberstack.logout();
      updateAuthBar(null);
      location.reload(); // simplest way to drop back to the paywall cleanly
    });

    // ── MEMBERSTACK PRE-BUILT MODAL: SUCCESS HOOK ──────────────────
    // Memberstack's hosted modal (triggered by any element carrying
    // data-ms-modal="login" or data-ms-modal="signup") emits a DOM event on
    // the document when auth completes. We listen for it here and route
    // straight into enterAppAfterAuth() — no custom form, no manual submit
    // handler. If the SDK version in use doesn't emit the event by name,
    // the polling fallback below still catches the new session.
    document.addEventListener("memberstack.onAuthChange", async (e) => {
      const member = e?.detail?.member || e?.detail || null;
      if (member) {
        await enterAppAfterAuth(member);
      } else {
        updateAuthBar(null);
      }
    });

    // Some Memberstack SDK builds expose an onAuthChange() subscription
    // directly on the DOM package instead of (or in addition to) the event
    // above. Wire it too — both are harmless to keep active simultaneously.
    if (typeof memberstack?.onAuthChange === "function") {
      memberstack.onAuthChange(async (member) => {
        if (member) {
          await enterAppAfterAuth(member);
        } else {
          updateAuthBar(null);
        }
      });
    }

    // ── FALLBACK: poll briefly after a modal-trigger click ──────────
    // Belt-and-suspenders for SDK builds that don't fire onAuthChange at all.
    // When the user clicks a data-ms-modal trigger, Memberstack opens its own
    // hosted overlay (no DOM we control). Once that overlay closes, we check
    // whether a session now exists and route in if so.
    function watchForModalClose(triggerEl) {
      triggerEl.addEventListener("click", () => {
        const poll = setInterval(async () => {
          // Memberstack appends/removes its own modal container; once it's
          // gone from the DOM we know the flow finished (success or cancel).
          const msModalOpen = document.querySelector('[class*="_ms-modal"], [id*="ms-modal"], iframe[src*="memberstack"]');
          if (!msModalOpen) {
            clearInterval(poll);
            const fresh = await getFreshMember();
            if (fresh) await enterAppAfterAuth(fresh);
          }
        }, 600);
        // Stop polling after 2 minutes regardless, so it never runs forever.
        setTimeout(() => clearInterval(poll), 120000);
      });
    }
    watchForModalClose(loginBtn);
    watchForModalClose(signupBtn);

    // ── BOOT: check if already logged in ─────────────────────────
    // NOTE: the main (non-module) script's waitForMemberstackDom() chain is
    // also running concurrently and will call startAuthorizedApp() if a valid
    // session exists. This module-script boot runs AFTER that chain because
    // ES modules are always deferred. We only need to update the auth-bar
    // chrome here — BUT if the paywall is still visible (e.g. a race where the
    // main chain resolved before the DOM was ready), we force entry now.
    try {
      const { data } = await memberstack.getCurrentMember();
      const bootMember = data?.member || data || null;
      updateAuthBar(bootMember);

      if (bootMember && document.getElementById("memberstackLoginBtn")) {
        await enterAppAfterAuth(bootMember);
      }
    } catch {
      updateAuthBar(null);
    }
    document.body.classList.add("ms-bar-visible");
  </script>

  <!-- ── MEMBERSTACK AUTH BAR (injected at top of page) ── -->
  <div id="ms-auth-bar">
    <div class="ms-bar-left">
      <span style="font-weight:800;font-size:15px;letter-spacing:-.01em">GSA Lattice</span>
      <span id="ms-member-badge" class="ms-badge" style="display:none"></span>
      <span id="ms-member-name" style="font-size:13px;opacity:.8;display:none"></span>
    </div>
    <div class="ms-bar-right">
      <!-- Memberstack's pre-built hosted modal: no custom form needed.
           data-ms-modal="login" / "signup" auto-opens Memberstack's own UI. -->
      <button id="ms-login-btn"  class="ms-btn ms-btn-outline" data-ms-modal="login">Log In</button>
      <button id="ms-signup-btn" class="ms-btn ms-btn-primary" data-ms-modal="signup">Sign Up →</button>
      <button id="ms-logout-btn" class="ms-btn ms-btn-danger"  style="display:none">Log Out</button>
    </div>
  </div>

</body></html>
